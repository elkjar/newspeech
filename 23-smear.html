<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // smear</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // smear">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/23-smear.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // smear">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">smear · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">rate</span><span class="val"></span>
    <input type="range" min="0.2" max="8" step="0.1" data-k="rate">
  </label>
  <label>
    <span class="name">hold</span><span class="val"></span>
    <input type="range" min="0.3" max="6" step="0.05" data-k="hold">
  </label>
  <label>
    <span class="name">coverage</span><span class="val"></span>
    <input type="range" min="0.05" max="0.8" step="0.01" data-k="coverage">
  </label>
  <label>
    <span class="name">drift</span><span class="val"></span>
    <input type="range" min="0" max="80" step="1" data-k="drift">
  </label>
  <label>
    <span class="name">orientation (rows→cols)</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="orientation">
  </label>
  <label>
    <span class="name">audio boost</span><span class="val"></span>
    <input type="range" min="0" max="10" step="0.1" data-k="audioBoost">
  </label>
</div>

<script src="core.js"></script>
<script>
// smear — scanline extrusion / pixel drag. Active smears grab a 1px row or
// column of the live frame and stretch it across a band of the image (the
// glue-drag look); the sampled line drifts slowly while the smear is alive so
// the dragged region liquefies instead of freezing. Spawns are dt-driven
// (no timers) so the offline renderer's virtual clock drives them.
const { intensity, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry, drawSoftDot } = Newspeech;
installInputs();

const params = {
  rate: 1.5,
  hold: 2.5,
  coverage: 0.35,
  drift: 18,
  orientation: 0.5,
  audioBoost: 4,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// Proc buffer follows the VIEWPORT aspect at a fixed pixel budget — a fixed
// landscape buffer double-cover-crops portrait viewports.
const PROC_BUDGET = 720 * 405;
let PROC_W = 720, PROC_H = 405;

const procCanvas = document.createElement("canvas");
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext("2d");

// 1px slice buffers — sample the line into these BEFORE overdrawing proc so
// the stretch never reads a region it just wrote.
const sliceH = document.createElement("canvas");
sliceH.width = PROC_W; sliceH.height = 1;
const sliceHCtx = sliceH.getContext("2d");
const sliceV = document.createElement("canvas");
sliceV.width = 1; sliceV.height = PROC_H;
const sliceVCtx = sliceV.getContext("2d");

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  const pw = Math.max(64, Math.round(Math.sqrt(PROC_BUDGET * (cw / ch))));
  const ph = Math.max(64, Math.round(PROC_BUDGET / pw));
  if (pw !== PROC_W || ph !== PROC_H) {
    PROC_W = pw;
    PROC_H = ph;
    procCanvas.width = PROC_W;
    procCanvas.height = PROC_H;
    sliceH.width = PROC_W;
    sliceV.height = PROC_H;
    // smear pos/len live in proc space — stale coordinates would drag the
    // wrong band; drop them, new ones spawn.
    smears.length = 0;
  }
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

// active smears — spawned per-frame from dt so the offline renderer's virtual
// clock drives them deterministically.
const MAX_SMEARS = 4;
const smears = [];
function spawnSmear() {
  if (smears.length >= MAX_SMEARS) return;
  const vertical = Math.random() < params.orientation;
  const dim = vertical ? PROC_W : PROC_H;
  const len = Math.max(8, params.coverage * dim * (0.7 + Math.random() * 0.6));
  const pos = dim * (0.15 + Math.random() * 0.7);
  const dir = Math.random() < 0.5 ? -1 : 1;
  const vel = (Math.random() * 2 - 1) * params.drift;
  smears.push({ vertical, pos, dir, len, vel, ttl: params.hold * (0.7 + Math.random() * 0.6) });
}

function drawSmears() {
  for (const s of smears) {
    if (s.vertical) {
      const x = Math.max(0, Math.min(PROC_W - 1, s.pos)) | 0;
      sliceVCtx.drawImage(procCanvas, x, 0, 1, PROC_H, 0, 0, 1, PROC_H);
      const a = s.pos, b = s.pos + s.dir * s.len;
      const start = Math.max(0, Math.min(a, b)) | 0;
      const end = Math.min(PROC_W, Math.max(a, b)) | 0;
      if (end - start < 1) continue;
      procCtx.drawImage(sliceV, 0, 0, 1, PROC_H, start, 0, end - start, PROC_H);
    } else {
      const y = Math.max(0, Math.min(PROC_H - 1, s.pos)) | 0;
      sliceHCtx.drawImage(procCanvas, 0, y, PROC_W, 1, 0, 0, PROC_W, 1);
      const a = s.pos, b = s.pos + s.dir * s.len;
      const start = Math.max(0, Math.min(a, b)) | 0;
      const end = Math.min(PROC_H, Math.max(a, b)) | 0;
      if (end - start < 1) continue;
      procCtx.drawImage(sliceH, 0, 0, PROC_W, 1, 0, start, PROC_W, end - start);
    }
  }
}

function step(dt) {
  const env = intensity();
  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    ctx.clearRect(0, 0, cw, ch);
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
    tickMarkers(dt);
    tickTelemetry(dt);
    return;
  }

  const rate = params.rate * (1 + env * params.audioBoost);
  if (Math.random() < rate * dt) spawnSmear();

  // tick + prune, drift the sampled line while alive
  for (let k = smears.length - 1; k >= 0; k--) {
    const s = smears[k];
    s.ttl -= dt;
    s.pos += s.vel * dt;
    if (s.ttl <= 0) smears.splice(k, 1);
  }

  // live frame first, cover-fit into proc
  procCtx.fillStyle = "#000";
  procCtx.fillRect(0, 0, PROC_W, PROC_H);
  const scale = Math.max(PROC_W / imgW, PROC_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  procCtx.drawImage(src, (PROC_W - drawW) * 0.5, (PROC_H - drawH) * 0.5, drawW, drawH);

  drawSmears();

  // upscale proc → main, cover-fit
  const mScale = Math.max(cw / PROC_W, ch / PROC_H);
  const mW = PROC_W * mScale;
  const mH = PROC_H * mScale;
  ctx.clearRect(0, 0, cw, ch);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(procCanvas, (cw - mW) * 0.5, (ch - mH) * 0.5, mW, mH);
  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  // click → drag a smear instantly
  spawnSmear();
});
</script>
</body>
</html>
