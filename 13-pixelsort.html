<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // pixelsort</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // pixelsort">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/13-pixelsort.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // pixelsort">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">pixelsort · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">band rate</span><span class="val"></span>
    <input type="range" min="0.2" max="12" step="0.1" data-k="bandRate">
  </label>
  <label>
    <span class="name">band duration</span><span class="val"></span>
    <input type="range" min="0.2" max="6" step="0.05" data-k="bandDuration">
  </label>
  <label>
    <span class="name">band height</span><span class="val"></span>
    <input type="range" min="6" max="160" step="1" data-k="bandHeight">
  </label>
  <label>
    <span class="name">threshold</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="threshold">
  </label>
  <label>
    <span class="name">polarity (dark→bright)</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="polarity">
  </label>
  <label>
    <span class="name">audio boost</span><span class="val"></span>
    <input type="range" min="0" max="10" step="0.1" data-k="audioBoost">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry } = Newspeech;
installInputs();

const params = {
  bandRate: 2.5,
  bandDuration: 1.6,
  bandHeight: 50,
  threshold: 0.5,
  polarity: 1,
  audioBoost: 4,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

const PROC_W = 720, PROC_H = 405;

const procCanvas = document.createElement("canvas");
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext("2d", { willReadFrequently: true });

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

// active sort bands; scheduled via Poisson + audio onsets.
const bands = [];
function spawnBand() {
  const h = Math.max(4, params.bandHeight + (Math.random() - 0.5) * params.bandHeight * 0.5);
  const y = Math.floor(Math.random() * Math.max(1, PROC_H - h));
  // each band randomly picks a polarity ±0.5 around the slider so the slider's
  // 0.5 default produces a mix of dark- and bright-span sorts.
  const polarityFlip = Math.random() < 0.4;
  bands.push({ y, h: h | 0, polarityFlip, ttl: params.bandDuration });
}

poisson(
  () => params.bandRate * (1 + intensity() * params.audioBoost),
  () => spawnBand()
);

function sortBandInPlace(data, yStart, h, polarityFlip) {
  if (yStart < 0 || yStart + h > PROC_H) return;
  const W = PROC_W;
  const sortAbove = polarityFlip ? params.polarity < 0.5 : params.polarity >= 0.5;
  const t = params.threshold * 255;
  const luma = new Float32Array(W);

  for (let row = 0; row < h; row++) {
    const rowOff = (yStart + row) * W * 4;
    for (let x = 0; x < W; x++) {
      const idx = rowOff + x * 4;
      luma[x] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
    }

    let i = 0;
    while (i < W) {
      while (i < W) {
        const passes = sortAbove ? luma[i] > t : luma[i] < t;
        if (passes) break;
        i++;
      }
      if (i >= W) break;
      let j = i;
      while (j < W) {
        const passes = sortAbove ? luma[j] > t : luma[j] < t;
        if (!passes) break;
        j++;
      }
      const len = j - i;
      if (len > 1) {
        const indices = new Int32Array(len);
        for (let k = 0; k < len; k++) indices[k] = i + k;
        const idxArr = Array.from(indices);
        idxArr.sort((a, b) => luma[a] - luma[b]);
        const tmp = new Uint8ClampedArray(len * 4);
        for (let k = 0; k < len; k++) {
          const srcIdx = rowOff + idxArr[k] * 4;
          const dstIdx = k * 4;
          tmp[dstIdx]   = data[srcIdx];
          tmp[dstIdx+1] = data[srcIdx+1];
          tmp[dstIdx+2] = data[srcIdx+2];
          tmp[dstIdx+3] = data[srcIdx+3];
        }
        for (let k = 0; k < len; k++) {
          const dstIdx = rowOff + (i + k) * 4;
          const srcIdx = k * 4;
          data[dstIdx]   = tmp[srcIdx];
          data[dstIdx+1] = tmp[srcIdx+1];
          data[dstIdx+2] = tmp[srcIdx+2];
          data[dstIdx+3] = tmp[srcIdx+3];
        }
      }
      i = j;
    }
  }
}

function step(dt) {
  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    ctx.clearRect(0, 0, cw, ch);
    return;
  }

  procCtx.fillStyle = "#000";
  procCtx.fillRect(0, 0, PROC_W, PROC_H);
  // cover-fit src into proc canvas
  const scale = Math.max(PROC_W / imgW, PROC_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  procCtx.drawImage(src, (PROC_W - drawW) * 0.5, (PROC_H - drawH) * 0.5, drawW, drawH);

  // tick + prune bands
  for (let k = bands.length - 1; k >= 0; k--) {
    bands[k].ttl -= dt;
    if (bands[k].ttl <= 0) bands.splice(k, 1);
  }

  if (bands.length) {
    const img = procCtx.getImageData(0, 0, PROC_W, PROC_H);
    const data = img.data;
    for (const b of bands) sortBandInPlace(data, b.y, b.h, b.polarityFlip);
    procCtx.putImageData(img, 0, 0);
  }

  // upscale proc → main, cover-fit
  const mScale = Math.max(cw / PROC_W, ch / PROC_H);
  const mW = PROC_W * mScale;
  const mH = PROC_H * mScale;
  ctx.clearRect(0, 0, cw, ch);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(procCanvas, (cw - mW) * 0.5, (ch - mH) * 0.5, mW, mH);
  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  // click → spawn a small burst of bands for instant feedback
  for (let i = 0; i < 4; i++) spawnBand();
});
</script>
</body>
</html>
