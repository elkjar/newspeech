<!-- audio analyser tap MUST be set up before Strudel constructs its audio
     graph. monkey-patches AudioNode.connect so anything connecting to
     ctx.destination also branches into our analyser. -->
<script>
(function setupAnalyserTap() {
  let analyser = null;
  let analyserCtx = null;
  const origConnect = AudioNode.prototype.connect;

  function ensureAnalyser(ctx) {
    if (analyser && analyserCtx === ctx) return analyser;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.4;
    analyserCtx = ctx;
    window.__newspeechAnalyser = analyser;
    window.__newspeechAudioCtx = ctx;
    window.__newspeechTapCount = (window.__newspeechTapCount || 0) + 1;
    return analyser;
  }

  // tap A: anything that connects to ctx.destination
  AudioNode.prototype.connect = function(target, ...rest) {
    try {
      const ctx = this.context;
      if (ctx && target === ctx.destination) {
        const a = ensureAnalyser(ctx);
        try { origConnect.call(this, a); } catch (e) {}
      }
    } catch (e) {}
    return origConnect.call(this, target, ...rest);
  };

  // tap B: every AudioBufferSourceNode at construction. Strudel's sample
  // playback (bd, hh, cp, etc.) goes through this node — its connect chain
  // doesn't always end at ctx.destination directly.
  if (typeof BaseAudioContext !== "undefined") {
    const origCreateBufferSource = BaseAudioContext.prototype.createBufferSource;
    BaseAudioContext.prototype.createBufferSource = function() {
      const node = origCreateBufferSource.apply(this, arguments);
      try {
        const a = ensureAnalyser(this);
        origConnect.call(node, a);
        window.__newspeechBufferTaps = (window.__newspeechBufferTaps || 0) + 1;
      } catch (e) {}
      return node;
    };
  }
})();
</script>

<script src="https://unpkg.com/@strudel/repl@latest"></script>

<script>
// ---- audio analysis: overall + band split + per-band onset detection ----
let audioLevel = 0;
let lowLevel = 0, midLevel = 0, highLevel = 0;
// peak-tracker per band — onset fires when band level rises sharply above its
// slowly-decaying peak. cooldowns prevent retriggering inside one transient.
let lowPeak = 0, midPeak = 0, highPeak = 0;
let lowCool = 0, midCool = 0, highCool = 0;
// one-frame onset flags drained by the RAF loop
let lowOnset = false, midOnset = false, highOnset = false;

const ONSET_RISE = 0.07;          // level jump above peak that counts
const ONSET_COOL_MS = 80;         // refractory window per band
const PEAK_DECAY = 0.985;         // per-frame peak release

function readAudio(dtMs) {
  const a = window.__newspeechAnalyser;
  if (!a) return;

  // time-domain RMS
  const tbuf = new Uint8Array(a.fftSize);
  a.getByteTimeDomainData(tbuf);
  let sum = 0;
  for (let i = 0; i < tbuf.length; i++) {
    const v = (tbuf[i] - 128) / 128;
    sum += v * v;
  }
  const timeRMS = Math.sqrt(sum / tbuf.length);

  // frequency-domain band split
  const bins = a.frequencyBinCount;
  const fbuf = new Uint8Array(bins);
  a.getByteFrequencyData(fbuf);
  const b1 = Math.max(1, Math.floor(bins * 0.06));   // ~bass cutoff
  const b2 = Math.max(b1 + 1, Math.floor(bins * 0.35)); // ~mid cutoff
  let lowSum = 0, midSum = 0, highSum = 0, allSum = 0;
  for (let i = 0; i < b1; i++) lowSum += fbuf[i];
  for (let i = b1; i < b2; i++) midSum += fbuf[i];
  for (let i = b2; i < bins; i++) highSum += fbuf[i];
  for (let i = 0; i < bins; i++) allSum += fbuf[i];
  const low  = Math.min(1, (lowSum  / b1) / 255 * 1.6);
  const mid  = Math.min(1, (midSum  / (b2 - b1)) / 255 * 2.0);
  const high = Math.min(1, (highSum / (bins - b2)) / 255 * 2.4);
  const overall = Math.min(1, Math.max(timeRMS * 5, (allSum / bins) / 255 * 2.2));

  // smoothed levels
  audioLevel += (overall - audioLevel) * 0.25;
  lowLevel  += (low  - lowLevel)  * 0.35;
  midLevel  += (mid  - midLevel)  * 0.35;
  highLevel += (high - highLevel) * 0.4;

  // onset detection per band
  lowCool  = Math.max(0, lowCool  - dtMs);
  midCool  = Math.max(0, midCool  - dtMs);
  highCool = Math.max(0, highCool - dtMs);
  lowOnset  = lowCool  === 0 && low  > lowPeak  + ONSET_RISE;
  midOnset  = midCool  === 0 && mid  > midPeak  + ONSET_RISE;
  highOnset = highCool === 0 && high > highPeak + ONSET_RISE;
  if (lowOnset)  lowCool  = ONSET_COOL_MS;
  if (midOnset)  midCool  = ONSET_COOL_MS;
  if (highOnset) highCool = ONSET_COOL_MS;
  lowPeak  = Math.max(low,  lowPeak  * PEAK_DECAY);
  midPeak  = Math.max(mid,  midPeak  * PEAK_DECAY);
  highPeak = Math.max(high, highPeak * PEAK_DECAY);

}

// intensity is now purely the smoothed audio level.
function intensity() { return audioLevel; }

// ---- canvas ----
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
const tex = document.createElement("canvas");
const tctx = tex.getContext("2d");

let viewW, viewH, dpr;
let scrollY = 0;
let scrollSpeed = 0.5;

function buildTexture() {
  const w = viewW;
  const h = viewH * 2;
  tex.width = w;
  tex.height = h;
  tctx.fillStyle = "#050505";
  tctx.fillRect(0, 0, w, h);
  const numStreaks = Math.floor(h * 2.5);
  for (let i = 0; i < numStreaks; i++) {
    const y = (Math.random() * h) | 0;
    const xStart = Math.random() * w;
    const xLen = 30 + Math.random() * (w * 0.7);
    const a = Math.pow(Math.random(), 4) * 0.5 + 0.006;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(xStart, y, xLen, 1);
  }
  for (let i = 0; i < 5; i++) {
    const y = (Math.random() * h) | 0;
    const a = 0.25 + Math.random() * 0.45;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(0, y, w, 1 + ((Math.random() * 2) | 0));
  }
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildTexture();
}
window.addEventListener("resize", resize);
resize();

// ---- chevron bands ----
const chevronBands = [];
function makeChevronTile(period, h) {
  const tw = Math.ceil(period * 2);
  const tile = document.createElement("canvas");
  tile.width = tw;
  tile.height = h;
  const tx = tile.getContext("2d");
  tx.fillStyle = "#ffffff";
  const amp = h * 0.45;
  for (let x = 0; x < tw; x++) {
    const tri = Math.abs(((x / period) % 2) - 1);
    const yy = (h / 2) + (tri - 0.5) * amp;
    tx.fillRect(x, yy, 1, 2);
  }
  return tile;
}
function spawnChevronBands() {
  chevronBands.length = 0;
  const num = 5 + ((Math.random() * 4) | 0);
  for (let i = 0; i < num; i++) {
    const h = 12 + ((Math.random() * 50) | 0);
    const period = 6 + Math.random() * 10;
    chevronBands.push({
      y: Math.random() * (viewH - h),
      h, period,
      tile: makeChevronTile(period, h),
      x: Math.random() * 1000,
      vx: (Math.random() * 2 - 1) * (40 + Math.random() * 120),
      baseAlpha: 0.04 + Math.random() * 0.10,
      breathPeriod: 3000 + Math.random() * 9000,
      breathPhase: Math.random() * Math.PI * 2,
    });
  }
}
spawnChevronBands();
const tears = [];

// ---- streaks ----
// audio dispatch: low onset → tear, mid onset → chevron respawn, high onset →
// texture rebuild. chevron alpha rides high band; scroll speed rides low.
function drawStreaks(t, dt) {
  if (lowOnset) {
    const h = 4 + Math.random() * 18 + lowLevel * 24;
    const y = Math.random() * (viewH - h);
    tears.push({ y, h, until: t + 80 + Math.random() * 80 });
  }
  if (midOnset) spawnChevronBands();
  if (highOnset && highLevel > 0.4) buildTexture();

  const scroll = scrollSpeed * (0.3 + 2.4 * lowLevel);
  scrollY = (scrollY + scroll * dt) % viewH;
  ctx.clearRect(0, 0, viewW, viewH);
  ctx.drawImage(tex, 0, scrollY, viewW, viewH, 0, 0, viewW, viewH);

  for (const b of chevronBands) {
    b.x += b.vx * dt * (0.4 + 1.6 * highLevel);
    const a = b.baseAlpha * (0.2 + 4 * highLevel);
    if (a < 0.005) continue;
    ctx.globalAlpha = Math.min(1, a);
    const tw = b.tile.width;
    const startX = -(((b.x % tw) + tw) % tw);
    for (let dx = startX; dx < viewW; dx += tw) {
      ctx.drawImage(b.tile, dx, b.y);
    }
  }
  ctx.globalAlpha = 1;
  for (let i = tears.length - 1; i >= 0; i--) {
    const tr = tears[i];
    if (t > tr.until) { tears.splice(i, 1); continue; }
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
    ctx.fillRect(0, tr.y, viewW, tr.h);
  }
}

// ---- static ----
const STATIC_W = 480, STATIC_H = 270;
let staticCanvas, staticCtx, staticImg;
function initStatic() {
  staticCanvas = document.createElement("canvas");
  staticCanvas.width = STATIC_W;
  staticCanvas.height = STATIC_H;
  staticCtx = staticCanvas.getContext("2d");
  staticImg = staticCtx.createImageData(STATIC_W, STATIC_H);
  const d = staticImg.data;
  for (let i = 0; i < d.length; i += 4) { d[i] = d[i+1] = d[i+2] = 255; }
}
function drawStatic(t, dt) {
  if (!staticImg) initStatic();
  // density tracks overall level — silent = empty, loud = dense
  const density = audioLevel * 0.8;
  const brightness = 120 + 135 * highLevel; // hats brighten the snow
  const d = staticImg.data;
  for (let i = 3; i < d.length; i += 4) {
    if (density > 0 && Math.random() < density) {
      const r = Math.random();
      d[i] = (r * r * brightness) | 0;
    } else {
      d[i] = 0;
    }
  }
  staticCtx.putImageData(staticImg, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);
  ctx.drawImage(staticCanvas, 0, 0, viewW, viewH);
}

// ---- invert ----
// reroll on low onset (kick). silent = no inversion blocks.
let invertBlocks = null;
function initInvert() { invertBlocks = null; }
function rerollInvertBlocks() {
  invertBlocks = [];
  const num = 3 + ((Math.random() * 8) | 0) + (lowLevel * 6) | 0;
  for (let i = 0; i < num; i++) {
    invertBlocks.push({
      x: ((Math.random() * viewW) | 0) - 80,
      y: ((Math.random() * viewH) | 0) - 30,
      w: 100 + ((Math.random() * 360) | 0),
      h: 40 + ((Math.random() * 200) | 0),
    });
  }
}
function drawInvert(t, dt) {
  if (!tex.width) return;
  if (lowOnset) rerollInvertBlocks();
  if (highOnset && highLevel > 0.4) buildTexture();

  const scroll = scrollSpeed * (0.3 + 2.4 * lowLevel);
  scrollY = (scrollY + scroll * dt) % viewH;
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);
  ctx.drawImage(tex, 0, scrollY, viewW, viewH, 0, 0, viewW, viewH);
  if (invertBlocks) {
    ctx.save();
    ctx.globalCompositeOperation = "difference";
    ctx.fillStyle = "#ffffff";
    for (const b of invertBlocks) ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();
  }
}

// ---- blocks ----
// reroll on low or mid onset. invert ratio rides high level.
let blockTiles = null;
function initBlocks() { blockTiles = null; }
function rerollBlocks() {
  blockTiles = [];
  const cols = 5 + ((Math.random() * 5) | 0);
  const rows = 4 + ((Math.random() * 4) | 0);
  const baseW = viewW / cols;
  const baseH = viewH / rows;
  const invertRatio = 0.05 + highLevel * 0.45;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = Math.random();
      let sw = baseW, sh = baseH;
      if (d < 0.25) sh = baseH * (0.25 + Math.random() * 0.4);
      else if (d < 0.5) sw = baseW * (0.25 + Math.random() * 0.4);
      blockTiles.push({
        dx: c * baseW, dy: r * baseH, dw: baseW, dh: baseH,
        sx: Math.random() * Math.max(1, tex.width - sw),
        sy: Math.random() * Math.max(1, tex.height - sh),
        sw, sh,
        inverted: Math.random() < invertRatio,
      });
    }
  }
}
function drawBlocks(t, dt) {
  if (!tex.width) return;
  if (lowOnset || midOnset) rerollBlocks();
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);
  if (!blockTiles) return;
  for (const tile of blockTiles) {
    ctx.drawImage(tex, tile.sx, tile.sy, tile.sw, tile.sh,
                       tile.dx, tile.dy, tile.dw, tile.dh);
  }
  ctx.save();
  ctx.globalCompositeOperation = "difference";
  ctx.fillStyle = "#ffffff";
  for (const tile of blockTiles) {
    if (tile.inverted) ctx.fillRect(tile.dx, tile.dy, tile.dw, tile.dh);
  }
  ctx.restore();
}

// ---- stars ----
const STAR_DEPTH_CHARS = ".,'+*oO@#";
const STAR_GLITCH_CHARS = "/\\|=~<>?!*#";
let stars = null;
function initStars() {
  const num = 600 + ((Math.random() * 300) | 0);
  stars = [];
  for (let i = 0; i < num; i++) stars.push(spawnStar(true));
}
function spawnStar(scattered) {
  return {
    x: (Math.random() - 0.5) * 2,
    y: (Math.random() - 0.5) * 2,
    z: scattered ? Math.random() * 0.95 + 0.05 : 1,
    speed: 0.12 + Math.random() * 0.55,
    held: null,
    holdUntil: 0,
  };
}
// stars: low onset → warp kick boost (decays), mid onset → polarity flip,
// high onset → horizontal scan flash. glitch rate rides high level. silent =
// stars drift at minimum speed, no glitches.
let starsWarpBoost = 1;
let starsPolarityFlash = false;
let starsHScan = null; // {y, h, until}
let starsVScan = null; // {x, w, until}
function drawStars(t, dt) {
  if (!stars) initStars();

  if (lowOnset)  starsWarpBoost = Math.max(starsWarpBoost, 2 + lowLevel * 5);
  if (midOnset && midLevel > 0.4) starsPolarityFlash = true;
  if (highOnset) {
    starsHScan = { y: Math.random() * viewH, h: 1 + Math.random() * 5, until: t + 60 };
    if (highLevel > 0.5) starsVScan = { x: Math.random() * viewW, w: 1 + Math.random() * 4, until: t + 60 };
  }
  // warp boost decays exponentially toward 1
  starsWarpBoost = 1 + (starsWarpBoost - 1) * Math.pow(0.001, dt);

  ctx.fillStyle = "rgba(5, 5, 5, 0.42)";
  ctx.fillRect(0, 0, viewW, viewH);
  ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, monospace";
  ctx.textBaseline = "middle";
  ctx.textAlign = "center";

  const cx = viewW / 2;
  const cy = viewH / 2;
  const speedScale = 0.15 + 1.5 * audioLevel;
  const glitchRate = 0.005 + 0.18 * highLevel;

  for (const s of stars) {
    s.z -= s.speed * dt * speedScale * starsWarpBoost;
    if (s.z <= 0.02) { Object.assign(s, spawnStar(false)); continue; }
    const px = cx + (s.x / s.z) * (viewW * 0.5);
    const py = cy + (s.y / s.z) * (viewH * 0.5);
    if (px < -30 || px > viewW + 30 || py < -30 || py > viewH + 30) continue;
    const idx = Math.min(STAR_DEPTH_CHARS.length - 1,
      Math.max(0, Math.floor((1 - s.z) * STAR_DEPTH_CHARS.length)));
    let ch = STAR_DEPTH_CHARS[idx];
    let glitched = false;
    if (s.held && t < s.holdUntil) { ch = s.held; glitched = true; }
    else if (Math.random() < glitchRate) {
      s.held = STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0];
      s.holdUntil = t + 50 + Math.random() * 110;
      ch = s.held;
      glitched = true;
    } else { s.held = null; }
    const a = Math.min(1, 1.05 - s.z * 0.7);
    ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    ctx.fillText(ch, px, py);
    if (glitched) {
      ctx.globalAlpha = a * 0.55;
      ctx.fillText(STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0], px, py - 14);
      ctx.globalAlpha = a * 0.30;
      ctx.fillText(STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0], px, py - 28);
      ctx.globalAlpha = 1;
    }
  }

  if (starsHScan && t < starsHScan.until) {
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
    ctx.fillRect(0, starsHScan.y, viewW, starsHScan.h);
  } else starsHScan = null;
  if (starsVScan && t < starsVScan.until) {
    ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
    ctx.fillRect(starsVScan.x, 0, starsVScan.w, viewH);
  } else starsVScan = null;
  if (starsPolarityFlash) {
    ctx.save();
    ctx.globalCompositeOperation = "difference";
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, viewW, viewH);
    ctx.restore();
    starsPolarityFlash = false;
  }
}

// ---- grid ----
// 40x40 grid of 1px square outlines, exponential ambient zoom, moiré from
// a 41x41 rotated overlay composited via difference, noise-warped vertices,
// jittered scroll snaps every few seconds, invert flash on bass onset.
// 2D-canvas implementation of the live-hydra grid — sidesteps having to
// load Hydra into this page (which would break the existing modes' RAF).
let gridFlashUntil = 0;
let gridSnapX = 0, gridSnapY = 0, gridSnapEnd = 0;

function gridNoiseAt(x, y, t) {
  return 0.5 * (
    Math.sin(x * 0.010 + t * 0.5) +
    Math.sin(y * 0.013 + t * 0.7) +
    Math.sin((x + y) * 0.007 + t * 0.3)
  );
}
function drawGridLines(N, segPerLine, t, useDifference) {
  const cellW = viewW / N;
  const cellH = viewH / N;
  if (useDifference) { ctx.save(); ctx.globalCompositeOperation = "difference"; }
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= N; i++) {
    const x = i * cellW;
    ctx.beginPath();
    for (let s = 0; s <= segPerLine; s++) {
      const y = (s / segPerLine) * viewH;
      const dx = gridNoiseAt(x, y, t) * 1.5;
      if (s === 0) ctx.moveTo(x + dx, y); else ctx.lineTo(x + dx, y);
    }
    ctx.stroke();
  }
  for (let j = 0; j <= N; j++) {
    const y = j * cellH;
    ctx.beginPath();
    for (let s = 0; s <= segPerLine; s++) {
      const x = (s / segPerLine) * viewW;
      const dy = gridNoiseAt(x + 100, y + 100, t) * 1.5;
      if (s === 0) ctx.moveTo(x, y + dy); else ctx.lineTo(x, y + dy);
    }
    ctx.stroke();
  }
  if (useDifference) ctx.restore();
}
function drawGrid(t, dt) {
  if (lowOnset) gridFlashUntil = t + 70;
  if (t > gridSnapEnd) { gridSnapX = 0; gridSnapY = 0; }

  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);

  const tSec = t / 1000;
  // exponential ambient zoom (1× → 2× loop ~12.5s) with bass-driven pulldown.
  const zoom = Math.pow(2, (tSec * 0.08) % 1) * (1 - lowLevel * 0.15);

  ctx.save();
  ctx.translate(gridSnapX + viewW / 2, gridSnapY + viewH / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-viewW / 2, -viewH / 2);

  drawGridLines(40, 32, tSec, false);

  ctx.save();
  ctx.translate(viewW / 2, viewH / 2);
  ctx.rotate(0.07);
  ctx.translate(-viewW / 2, -viewH / 2);
  drawGridLines(41, 32, tSec, true);
  ctx.restore();

  ctx.restore();

  // bass-triggered full-frame invert via difference compositing
  if (t < gridFlashUntil) {
    ctx.save();
    ctx.globalCompositeOperation = "difference";
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, viewW, viewH);
    ctx.restore();
  }
}
// jittered scroll snaps — gated on currentMode so other modes don't pay
// the random-number cost while inactive.
setInterval(() => {
  if (currentMode === "grid" && Math.random() < 0.15) {
    gridSnapX = (Math.random() - 0.5) * 0.3 * viewW;
    gridSnapY = (Math.random() - 0.5) * 0.3 * viewH;
    gridSnapEnd = performance.now() + 100;
  }
}, 700);

// ---- ridges ----
// stack of horizontal multi-frequency wave traces. baseline waviness from
// summed sines + always-on positive bumps + bass-onset event peaks that
// rise fast then slow-fall over ~1.5s. top lines fan out further than
// bottom (depthFactor) so peaks tower visually rather than translating
// the whole stack.
const RIDGE_LINES   = 36;
const RIDGE_TOP     = 0.18;
const RIDGE_BOT     = 0.92;
const RIDGE_SAMPLES = 320;
const ridgePeakEvents = [];
function spawnRidgePeak() {
  ridgePeakEvents.push({
    x: Math.random() * viewW,
    width: 60 + Math.random() * 220,
    height: 60 + lowLevel * 200,
    born: performance.now(),
    duration: 800 + Math.random() * 1500,
  });
}
function ridgeEventPeakAt(x, t) {
  let h = 0;
  for (let i = ridgePeakEvents.length - 1; i >= 0; i--) {
    const ev = ridgePeakEvents[i];
    const age = t - ev.born;
    if (age > ev.duration) { ridgePeakEvents.splice(i, 1); continue; }
    const dx = x - ev.x;
    const envelope = Math.exp(-Math.pow(dx / ev.width, 2));
    const lifeT = age / ev.duration;
    const lifeEnv = lifeT < 0.15 ? lifeT / 0.15 : 1 - (lifeT - 0.15) / 0.85;
    h += ev.height * envelope * Math.max(0, lifeEnv);
  }
  return h;
}
function drawRidges(t, dt) {
  if (lowOnset) spawnRidgePeak();
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);

  const tSec = t / 1000;
  const yTop = viewH * RIDGE_TOP;
  const yBot = viewH * RIDGE_BOT;
  const lineGap = (yBot - yTop) / (RIDGE_LINES - 1);

  ctx.strokeStyle = "rgba(255,255,255,0.92)";
  ctx.lineWidth = 1;
  ctx.lineJoin = "round";

  for (let line = 0; line < RIDGE_LINES; line++) {
    const y0 = yTop + lineGap * line;
    const linePhase = line * 0.43;
    const depthFactor = 0.3 + 0.7 * (1 - line / (RIDGE_LINES - 1));

    ctx.beginPath();
    for (let s = 0; s <= RIDGE_SAMPLES; s++) {
      const x = (s / RIDGE_SAMPLES) * viewW;
      const xn = x * 0.0055;

      let wave = 0;
      wave += Math.sin(xn * 1.0  + tSec * 0.27 + linePhase * 0.7) * 14;
      wave += Math.sin(xn * 2.3  + tSec * 0.41 + linePhase * 1.2) * 10;
      wave += Math.sin(xn * 5.7  + tSec * 0.69 + linePhase * 0.4) *  6;
      wave += Math.sin(xn * 13.1 + tSec * 1.07 + linePhase * 1.5) *  3;

      const bump = Math.max(0,
        0.6 * Math.sin(xn * 0.5 + tSec * 0.31 + linePhase * 0.2) +
        0.4 * Math.sin(xn * 0.9 + tSec * 0.19 + linePhase * 0.5)
      );
      const steadyPeak = Math.pow(bump, 5) * (30 + audioLevel * 80) * depthFactor;
      const evPeak     = ridgeEventPeakAt(x, t) * depthFactor;

      const y = y0 + wave - steadyPeak - evPeak;
      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ---- rings ----
// concentric rings with multi-frequency angular waves + always-on positive
// bumps + bass-onset event peaks pulsing outward at random angles. outer
// rings receive more push than inner so peaks burst outward. circular
// sibling of ridges. integer θ multipliers in the wave keep the polyline
// 2π-periodic so each ring closes cleanly.
const RING_COUNT     = 36;
const RING_SAMPLES   = 360;
const RING_INNER     = 50;
const ringPeakEvents = [];

function spawnRingPeak() {
  ringPeakEvents.push({
    theta: Math.random() * Math.PI * 2,
    angularWidth: 0.1 + Math.random() * 0.4,
    height: 90 + lowLevel * 300,
    born: performance.now(),
    duration: 800 + Math.random() * 1500,
  });
}
function ringEventPeakAt(theta, t) {
  let h = 0;
  for (let i = ringPeakEvents.length - 1; i >= 0; i--) {
    const ev = ringPeakEvents[i];
    const age = t - ev.born;
    if (age > ev.duration) { ringPeakEvents.splice(i, 1); continue; }
    // angular distance with 2π wraparound
    let dTheta = theta - ev.theta;
    if (dTheta >  Math.PI) dTheta -= Math.PI * 2;
    if (dTheta < -Math.PI) dTheta += Math.PI * 2;
    const envelope = Math.exp(-Math.pow(dTheta / ev.angularWidth, 2));
    const lifeT = age / ev.duration;
    const lifeEnv = lifeT < 0.15 ? lifeT / 0.15 : 1 - (lifeT - 0.15) / 0.85;
    h += ev.height * envelope * Math.max(0, lifeEnv);
  }
  return h;
}
function drawRings(t, dt) {
  if (lowOnset) spawnRingPeak();
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);

  const tSec = t / 1000;
  const cx = viewW / 2, cy = viewH / 2;
  const outerR = Math.min(viewW, viewH) * 0.45;
  const ringGap = (outerR - RING_INNER) / (RING_COUNT - 1);

  ctx.strokeStyle = "rgba(255, 255, 255, 0.92)";
  ctx.lineWidth = 1;
  ctx.lineJoin = "round";

  for (let ring = 0; ring < RING_COUNT; ring++) {
    const r0 = RING_INNER + ringGap * ring;
    const ringPhase = ring * 0.43;
    const depthFactor = 0.25 + 0.75 * (ring / (RING_COUNT - 1));

    ctx.beginPath();
    for (let s = 0; s <= RING_SAMPLES; s++) {
      const theta = (s / RING_SAMPLES) * Math.PI * 2;

      let wave = 0;
      wave += Math.sin(theta * 3  + tSec * 0.27 + ringPhase * 0.7) * 15;
      wave += Math.sin(theta * 5  + tSec * 0.41 + ringPhase * 1.2) * 10.5;
      wave += Math.sin(theta * 11 + tSec * 0.69 + ringPhase * 0.4) * 6;
      wave += Math.sin(theta * 19 + tSec * 1.07 + ringPhase * 1.5) * 3;

      const bump = Math.max(0,
        0.6 * Math.sin(theta * 2 + tSec * 0.31 + ringPhase * 0.2) +
        0.4 * Math.sin(theta * 3 + tSec * 0.19 + ringPhase * 0.5)
      );
      const steadyPeak = Math.pow(bump, 5) * (45 + audioLevel * 180) * depthFactor;
      const evPeak     = ringEventPeakAt(theta, t) * depthFactor;

      const r = r0 + wave + steadyPeak + evPeak;
      const x = cx + Math.cos(theta) * r;
      const y = cy + Math.sin(theta) * r;
      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ---- mode toggle ----
// rings sits at index 2 (key "3") so it's separated from ridges (key "8"),
// per the "don't put similar visualizers adjacent" rule.
const MODES = { streaks: drawStreaks, static: drawStatic, invert: drawInvert, blocks: drawBlocks, stars: drawStars, grid: drawGrid, ridges: drawRidges, rings: drawRings };
const MODE_ORDER = ["streaks", "static", "rings", "invert", "blocks", "stars", "grid", "ridges"];
let currentMode = MODE_ORDER[(Math.random() * MODE_ORDER.length) | 0];
// kick-driven auto-cycle is the default; locked when the user picks a mode
// via number keys, resumed by pressing 0.
let modeLocked = false;

function setMode(name) {
  if (!(name in MODES) || name === currentMode) return;
  currentMode = name;
  ctx.clearRect(0, 0, viewW, viewH);
  if (name === "static") initStatic();
  else if (name === "invert") initInvert();
  else if (name === "blocks") initBlocks();
  else if (name === "stars") initStars();
}

// ---- transmission readout: track / tempo / elapsed + band meters + onset pulses ----
function parseCpm(code) {
  if (!code) return null;
  const m = code.match(/\.cpm\(([^)]+)\)/);
  if (!m) return null;
  // safe parse: we only support N or N/M numeric forms (no eval)
  const expr = m[1].replace(/\s+/g, "");
  if (/^\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);
  const div = expr.match(/^(\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/);
  if (div) {
    const d = parseFloat(div[2]);
    return d ? parseFloat(div[1]) / d : null;
  }
  return null;
}

function bar10(level) {
  const n = Math.max(0, Math.min(10, Math.round(level * 10)));
  return "█".repeat(n) + "░".repeat(10 - n);
}

const transTrackEl   = document.getElementById("trans-track");
const transCpmEl     = document.getElementById("trans-cpm");
const transElapsedEl = document.getElementById("trans-elapsed");
const barLoEl        = document.getElementById("bar-lo");
const barMiEl        = document.getElementById("bar-mi");
const barHiEl        = document.getElementById("bar-hi");
const onsetLoEl      = document.getElementById("onset-lo");
const onsetMiEl      = document.getElementById("onset-mi");
const onsetHiEl      = document.getElementById("onset-hi");

let pulseLo = 0, pulseMi = 0, pulseHi = 0;
let elapsedStartAt = 0;
let lastSlowUpdate = 0;

function updateStatus(t) {
  // pulse decay each frame — onset = bright flash, then decays toward resting dim
  if (lowOnset)  pulseLo = 1;
  if (midOnset)  pulseMi = 1;
  if (highOnset) pulseHi = 1;
  pulseLo *= 0.88;
  pulseMi *= 0.88;
  pulseHi *= 0.88;
  onsetLoEl.style.opacity = (0.2 + pulseLo * 0.7).toFixed(2);
  onsetMiEl.style.opacity = (0.2 + pulseMi * 0.7).toFixed(2);
  onsetHiEl.style.opacity = (0.2 + pulseHi * 0.7).toFixed(2);

  // bars — only re-render when the discrete cell count changes
  const bL = bar10(lowLevel), bM = bar10(midLevel), bH = bar10(highLevel);
  if (bL !== barLoEl.textContent) barLoEl.textContent = bL;
  if (bM !== barMiEl.textContent) barMiEl.textContent = bM;
  if (bH !== barHiEl.textContent) barHiEl.textContent = bH;

  // slow tick — track name, parsed cpm, elapsed clock (every ~500ms)
  if (t - lastSlowUpdate > 500) {
    lastSlowUpdate = t;
    const opt = patchSelect.options[patchSelect.selectedIndex];
    const name = (opt && opt.text) || "—";
    if (transTrackEl.textContent !== name) transTrackEl.textContent = name;

    const ed = getStrudelEditor();
    const code = (ed && (
      (typeof ed.code === "string" && ed.code) ||
      (ed.editor && ed.editor.state && ed.editor.state.doc && ed.editor.state.doc.toString())
    )) || "";
    const cpm = parseCpm(code);
    const cpmText = cpm == null ? "— cpm" : `${cpm % 1 === 0 ? cpm.toFixed(0) : cpm.toFixed(1)} cpm`;
    if (transCpmEl.textContent !== cpmText) transCpmEl.textContent = cpmText;

    // start the elapsed clock once audio is actually running
    const ctx = window.__newspeechAudioCtx;
    if (ctx && ctx.state === "running" && elapsedStartAt === 0) {
      elapsedStartAt = performance.now();
    }
    let elapsedText = "00:00";
    if (elapsedStartAt > 0) {
      const total = Math.floor((performance.now() - elapsedStartAt) / 1000);
      elapsedText = `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
    }
    if (transElapsedEl.textContent !== elapsedText) transElapsedEl.textContent = elapsedText;
  }
}

// ---- RAF loop ----
// kick-driven mode switcher: each low-band onset advances to the next
// visualizer.
let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  const dtMs = t - lastT;
  lastT = t;
  readAudio(dtMs);
  updateStatus(t);

  if (lowOnset && !modeLocked) {
    const i = MODE_ORDER.indexOf(currentMode);
    setMode(MODE_ORDER[(i + 1) % MODE_ORDER.length]);
  }

  MODES[currentMode](t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("keydown", (e) => {
  // ignore key handling when typing in the editor
  if (e.target.closest("strudel-editor, input, textarea, [contenteditable]")) return;
  if (e.key === "0") { modeLocked = false; return; }
  const n = parseInt(e.key, 10);
  if (n >= 1 && n <= MODE_ORDER.length) {
    setMode(MODE_ORDER[n - 1]);
    modeLocked = true;
  }
});

// ---- play / pause buttons → StrudelMirror API ----
function getStrudelEditor() {
  const el = document.querySelector("strudel-editor");
  return el && el.editor; // StrudelMirror instance, populated once the
                          // custom element upgrades after the script loads.
}
document.getElementById("btn-play").addEventListener("click", () => {
  const ed = getStrudelEditor();
  if (!ed) return;
  // evaluate compiles current code and starts the scheduler — this is what
  // ctrl+enter does inside the editor.
  if (typeof ed.evaluate === "function") ed.evaluate();
  else if (typeof ed.start === "function") ed.start();
});
document.getElementById("btn-pause").addEventListener("click", () => {
  const ed = getStrudelEditor();
  if (!ed) return;
  if (typeof ed.stop === "function") ed.stop();
});

// ---- share URL: pack current code into location hash, copy to clipboard ----
// url-safe base64 with explicit UTF-8 round-trip (btoa alone breaks on non-ascii)
function encodeCode(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = "";
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function decodeCode(b64) {
  const padded = b64.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((b64.length + 3) % 4);
  const bin = atob(padded);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

const shareBtn = document.getElementById("btn-share");
shareBtn.addEventListener("click", async () => {
  const ed = getStrudelEditor();
  if (!ed) return;
  const code = (typeof ed.code === "string" && ed.code)
    || (ed.editor && ed.editor.state && ed.editor.state.doc && ed.editor.state.doc.toString())
    || "";
  if (!code.trim()) return;
  const url = location.origin + location.pathname + "#code=" + encodeCode(code);
  const orig = shareBtn.textContent;
  try {
    await navigator.clipboard.writeText(url);
    shareBtn.textContent = "copied";
  } catch (e) {
    // clipboard API blocked (e.g. file://) — fall back to a prompt the user can copy from
    prompt("copy this URL", url);
    shareBtn.textContent = "shown";
  }
  setTimeout(() => { shareBtn.textContent = orig; }, 1400);
});

// ---- download / import: timestamped .strudel files round-trip via the editor ----
function timestampSlug() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
}

document.getElementById("btn-download").addEventListener("click", () => {
  const ed = getStrudelEditor();
  if (!ed) return;
  const code = (typeof ed.code === "string" && ed.code)
    || (ed.editor && ed.editor.state && ed.editor.state.doc && ed.editor.state.doc.toString())
    || "";
  if (!code.trim()) return;
  const blob = new Blob([code], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `newspeech-${timestampSlug()}.strudel`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

const fileInput = document.getElementById("file-import");
document.getElementById("btn-import").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", async () => {
  const f = fileInput.files && fileInput.files[0];
  if (!f) return;
  const text = await f.text();
  const ed = getStrudelEditor();
  if (ed && typeof ed.setCode === "function") ed.setCode(text);
  // reset so picking the same file again still fires `change`
  fileInput.value = "";
});

// ---- bundled patches: the "playlist" the dropdown selects from ----

  s("bd*<2 4 2 8>").gain(0.95).shape(0.4),

  s("hh*16 [hh*16](3,8)").gain(2).coarse("<1 4 8 2>").pan(rand),
  // distorted clap with occasional triplet ratchet
  s("~ cp ~ <cp [cp cp cp]>").gain(0.7).crush(3),
  // crushed lo-fi bass

  note("<c4 g4 eb5 g4>(5,8)").s("square").gain(0.18).delay(0.3),

const patchSelect = document.getElementById("patch-select");
PATCHES.forEach((p, i) => {
  const o = document.createElement("option");
  o.value = String(i);
  o.textContent = p.name;
  patchSelect.appendChild(o);
});
// picking from the dropdown swaps the editor buffer AND evaluates — the
// select interaction is itself a user gesture, so audio context starts cleanly.
patchSelect.addEventListener("change", () => {
  const idx = parseInt(patchSelect.value, 10);
  const ed = getStrudelEditor();
  if (!ed || !PATCHES[idx]) return;
  ed.setCode(PATCHES[idx].code);
  if (typeof ed.evaluate === "function") ed.evaluate();
});

// ---- boot: wait for the custom element to upgrade, then load either the
// shared hash patch or PATCHES[0] as the default. don't auto-evaluate on boot
// because there's no user gesture yet — autoplay would be blocked anyway.
(async function bootEditor() {
  await customElements.whenDefined("strudel-editor");
  const el = document.querySelector("strudel-editor");
  for (let i = 0; i < 50 && !el.editor; i++) await new Promise(r => setTimeout(r, 50));
  if (!el.editor || typeof el.editor.setCode !== "function") return;

  const m = location.hash.match(/^#code=(.+)$/);
  if (m) {
    try { el.editor.setCode(decodeCode(m[1])); return; } catch (e) {}
  }
  el.editor.setCode(PATCHES[0].code);
  patchSelect.value = "0";
})();
</script>
