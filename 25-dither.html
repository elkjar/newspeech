<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // dither</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // dither">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/25-dither.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // dither">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">dither · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">cell size</span><span class="val"></span>
    <input type="range" min="3" max="24" step="1" data-k="cell">
  </label>
  <label>
    <span class="name">threshold</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="threshold">
  </label>
  <label>
    <span class="name">pump</span><span class="val"></span>
    <input type="range" min="0" max="2" step="0.01" data-k="pump">
  </label>
  <label>
    <span class="name">mode (bayer→dots)</span><span class="val"></span>
    <input type="range" min="0" max="1" step="1" data-k="mode">
  </label>
  <label>
    <span class="name">invert</span><span class="val"></span>
    <input type="range" min="0" max="1" step="1" data-k="invert">
  </label>
</div>

<script src="core.js"></script>
<script>
// dither — the source crushed to 1-bit. A small working buffer (one pixel per
// output cell, viewport aspect) is thresholded against a 4×4 Bayer matrix;
// white cells land opaque, everything else goes transparent so the site black
// shows through. The threshold rides intensity() so the whole image blooms
// and starves with the music. Dot mode swaps the matrix for a halftone screen
// (white discs sized by cell luma).
const { intensity, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry, drawSoftDot } = Newspeech;
installInputs();

const params = {
  cell: 8,
  threshold: 0.5,
  pump: 0.7,
  mode: 0,
  invert: 0,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// working buffer: one pixel per dither cell, follows the viewport aspect.
// Capped by total budget so tiny cells on huge windows can't blow the frame.
const PROC_BUDGET = 400000;
let PROC_W = 120, PROC_H = 200;
const procCanvas = document.createElement("canvas");
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext("2d", { willReadFrequently: true });
let outImg = null; // ImageData reused across frames in bayer mode

// (m + 0.5) / 16 — standard 4×4 ordered-dither thresholds.
const BAYER = [
  0, 8, 2, 10,
  12, 4, 14, 6,
  3, 11, 1, 9,
  15, 7, 13, 5,
].map((m) => (m + 0.5) / 16);

function rebuildProc() {
  if (!viewW || !viewH) return;
  let pw = Math.max(8, Math.round(viewW / params.cell));
  let ph = Math.max(8, Math.round(viewH / params.cell));
  const over = (pw * ph) / PROC_BUDGET;
  if (over > 1) {
    const s = Math.sqrt(over);
    pw = Math.max(8, Math.round(pw / s));
    ph = Math.max(8, Math.round(ph / s));
  }
  if (pw === PROC_W && ph === PROC_H) return;
  PROC_W = pw;
  PROC_H = ph;
  procCanvas.width = PROC_W;
  procCanvas.height = PROC_H;
  outImg = null;
}

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
  rebuildProc();
}
window.addEventListener("resize", resize);

function step(dt) {
  const env = intensity();
  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    ctx.clearRect(0, 0, cw, ch);
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
    tickMarkers(dt);
    tickTelemetry(dt);
    return;
  }

  procCtx.fillStyle = "#000";
  procCtx.fillRect(0, 0, PROC_W, PROC_H);
  // cover-fit src into proc canvas
  const scale = Math.max(PROC_W / imgW, PROC_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  procCtx.drawImage(src, (PROC_W - drawW) * 0.5, (PROC_H - drawH) * 0.5, drawW, drawH);

  const img = procCtx.getImageData(0, 0, PROC_W, PROC_H);
  const data = img.data;
  const bias = (params.threshold - 0.5) - (env - 0.5) * params.pump;
  const inv = params.invert >= 0.5;

  // blit geometry proc → main (proc follows the viewport aspect, so this is
  // effectively a full-frame stretch; cover-fit guards the rounding).
  const mScale = Math.max(cw / PROC_W, ch / PROC_H);
  const mW = PROC_W * mScale;
  const mH = PROC_H * mScale;
  const offX = (cw - mW) * 0.5;
  const offY = (ch - mH) * 0.5;

  ctx.clearRect(0, 0, cw, ch);

  if (params.mode < 0.5) {
    // bayer 1-bit — white where luma clears the matrix, transparent elsewhere.
    if (!outImg || outImg.width !== PROC_W || outImg.height !== PROC_H) {
      outImg = new ImageData(PROC_W, PROC_H);
    }
    const od = outImg.data;
    for (let y = 0; y < PROC_H; y++) {
      const rowOff = y * PROC_W;
      const bRow = (y & 3) * 4;
      for (let x = 0; x < PROC_W; x++) {
        const idx = (rowOff + x) * 4;
        const luma = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
        let on = luma > BAYER[bRow + (x & 3)] + bias;
        if (inv) on = !on;
        od[idx] = 255; od[idx + 1] = 255; od[idx + 2] = 255;
        od[idx + 3] = on ? 255 : 0;
      }
    }
    procCtx.putImageData(outImg, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(procCanvas, offX, offY, mW, mH);
  } else {
    // halftone — one white disc per cell, radius from cell luma (sqrt so disc
    // AREA tracks brightness). Single path, single fill.
    const lift = (env - 0.5) * params.pump * 0.5;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    for (let y = 0; y < PROC_H; y++) {
      const rowOff = y * PROC_W;
      const py = offY + (y + 0.5) * mScale;
      for (let x = 0; x < PROC_W; x++) {
        const idx = (rowOff + x) * 4;
        let l = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255 + lift;
        if (inv) l = 1 - l;
        if (l <= 0.02) continue;
        if (l > 1) l = 1;
        const r = mScale * 0.53 * Math.sqrt(l);
        if (r < 0.3) continue;
        const px = offX + (x + 0.5) * mScale;
        ctx.moveTo(px + r, py);
        ctx.arc(px, py, r, 0, Math.PI * 2);
      }
    }
    ctx.fill();
  }

  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

window.onParamChange = (k) => {
  if (k === "cell") rebuildProc();
};

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});
</script>
</body>
</html>
