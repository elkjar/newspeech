<!-- analyser tap MUST set up before strudel constructs its audio graph.
     monkey-patches AudioNode.connect so anything routed to ctx.destination
     also branches into our analyser. lifted from live.html. -->
<script>
(function setupAnalyserTap() {
  let analyser = null;
  let analyserCtx = null;
  const origConnect = AudioNode.prototype.connect;

  function ensureAnalyser(ctx) {
    if (analyser && analyserCtx === ctx) return analyser;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.4;
    analyserCtx = ctx;
    window.__newspeechAnalyser = analyser;
    window.__newspeechAudioCtx = ctx;
    return analyser;
  }

  AudioNode.prototype.connect = function(target, ...rest) {
    try {
      const ctx = this.context;
      if (ctx && target === ctx.destination) {
        const a = ensureAnalyser(ctx);
        try { origConnect.call(this, a); } catch (e) {}
      }
    } catch (e) {}
    return origConnect.call(this, target, ...rest);
  };

  if (typeof BaseAudioContext !== "undefined") {
    const origCreateBufferSource = BaseAudioContext.prototype.createBufferSource;
    BaseAudioContext.prototype.createBufferSource = function() {
      const node = origCreateBufferSource.apply(this, arguments);
      try {
        const a = ensureAnalyser(this);
        origConnect.call(node, a);
      } catch (e) {}
      return node;
    };
  }
})();
</script>

<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="https://unpkg.com/hydra-synth"></script>

<script>
// ---- canvas sizing ----
const canvas = document.getElementById("bg");
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

// ---- hydra ----
// detectAudio:false because we have our own analyser tap. makeGlobal exposes
// shape/osc/noise/etc. as globals so the patch below reads as a normal Hydra
// snippet you could paste into hydra.ojack.xyz.
let hydra;
try {
  if (typeof Hydra === "undefined") throw new Error("Hydra not loaded (CDN blocked?)");
  hydra = new Hydra({
    canvas,
    detectAudio: false,
    makeGlobal: true,
    width: canvas.width,
    height: canvas.height,
  });
} catch (e) {
  console.error("hydra init failed:", e);
}

window.addEventListener("resize", () => {
  resizeCanvas();
  if (hydra && typeof hydra.setResolution === "function") {
    hydra.setResolution(canvas.width, canvas.height);
  }
});

// ---- audio analysis: smoothed band levels exposed as window.__low/mid/high ----
let audioLevel = 0, lowLevel = 0, midLevel = 0, highLevel = 0;
function readAudio() {
  const a = window.__newspeechAnalyser;
  if (!a) return;
  const bins = a.frequencyBinCount;
  const fbuf = new Uint8Array(bins);
  a.getByteFrequencyData(fbuf);
  const b1 = Math.max(1, Math.floor(bins * 0.06));
  const b2 = Math.max(b1 + 1, Math.floor(bins * 0.35));
  let lo = 0, mi = 0, hi = 0, all = 0;
  for (let i = 0; i < b1; i++)         lo  += fbuf[i];
  for (let i = b1; i < b2; i++)        mi  += fbuf[i];
  for (let i = b2; i < bins; i++)      hi  += fbuf[i];
  for (let i = 0; i < bins; i++)       all += fbuf[i];
  const low  = Math.min(1, (lo  / b1)         / 255 * 1.6);
  const mid  = Math.min(1, (mi  / (b2 - b1))  / 255 * 2.0);
  const high = Math.min(1, (hi  / (bins - b2))/ 255 * 2.4);
  const amp  = Math.min(1, (all / bins)       / 255 * 2.2);
  lowLevel  += (low  - lowLevel)  * 0.35;
  midLevel  += (mid  - midLevel)  * 0.35;
  highLevel += (high - highLevel) * 0.4;
  audioLevel += (amp - audioLevel) * 0.25;
  window.__low  = lowLevel;
  window.__mid  = midLevel;
  window.__high = highLevel;
  window.__amp  = audioLevel;
}

const barLo = document.getElementById("bar-lo");
const barMi = document.getElementById("bar-mi");
const barHi = document.getElementById("bar-hi");
function bar10(v) {
  const n = Math.max(0, Math.min(10, Math.round(v * 10)));
  return "█".repeat(n) + "░".repeat(10 - n);
}
// ---- diagnostics loop ----
// setInterval, NOT requestAnimationFrame — Hydra silently swallows external
// RAF callbacks once it's loaded (see the Hydra-gotchas memory). 50ms / 20Hz
// is plenty for the audio analyser + telemetry.
const frameEl    = document.getElementById("frame");
const sysHydraEl = document.getElementById("sys-hydra");
const sysAnEl    = document.getElementById("sys-anlysr");
const sysCtxEl   = document.getElementById("sys-ctx");
const vLoEl      = document.getElementById("v-lo");
const vMiEl      = document.getElementById("v-mi");
const vHiEl      = document.getElementById("v-hi");
const vAmpEl     = document.getElementById("v-amp");

sysHydraEl.textContent = hydra ? "OK" : "FAIL";
if (!hydra) sysHydraEl.classList.add("bad");

let tickCount = 0;
function pad6(n) { return String(n).padStart(6, "0"); }
setInterval(() => {
  tickCount++;
  readAudio();

  // band meter bars
  const bL = bar10(lowLevel), bM = bar10(midLevel), bH = bar10(highLevel);
  if (bL !== barLo.textContent) barLo.textContent = bL;
  if (bM !== barMi.textContent) barMi.textContent = bM;
  if (bH !== barHi.textContent) barHi.textContent = bH;

  // numeric values
  vLoEl.textContent  = lowLevel.toFixed(2);
  vMiEl.textContent  = midLevel.toFixed(2);
  vHiEl.textContent  = highLevel.toFixed(2);
  vAmpEl.textContent = audioLevel.toFixed(2);

  // frame counter + sys state
  frameEl.textContent = pad6(tickCount);
  const a = window.__newspeechAnalyser;
  const c = window.__newspeechAudioCtx;
  const an = a ? "OK" : "--";
  if (sysAnEl.textContent !== an) {
    sysAnEl.textContent = an;
    sysAnEl.classList.toggle("bad", !a);
  }
  const cs = c ? c.state.toUpperCase() : "--";
  if (sysCtxEl.textContent !== cs) sysCtxEl.textContent = cs;
}, 50);

// ---- hydra patch: 40x40 grid of 1px square outlines, infinite-zoom + B&W ----
// Outline = outer square minus slightly smaller inner square (diff). At 40
// cells across a ~1280px canvas, cells are ~32px; outer 0.95 / inner 0.88
// gives a ~1.1 device px line. Trailing .thresh(0.5) keeps everything binary
// even where the smoothstep edges produce sub-pixel greys.
//
// Ambient motion: scale = 2^((time*0.08) % 1) — exponential zoom from 1× to
// 2×, looping every ~12.5s. Combined with repeat(40,40), the loop boundary
// reads as "zooming past one level of detail" rather than a reset, because
// the smaller cells visible at scale=1 are the same pattern as the larger
// ones at scale=2. That's the infinite-zoom illusion.
//
// Audio: bass folds in as a small zoom-out pulse on the ambient base. Kept
// subtle (×0.85 at peak) so the zoom keeps reading even with no music.
// Only .scale and .thresh accept fn args cleanly here — see Hydra-gotchas.
// factor the outline shape so we can reuse it for the moiré layer.
const grid = () => shape(4, 0.95, 0.001).diff(shape(4, 0.88, 0.001));

// chain factored as a function so we can re-issue with new static scroll
// offsets to produce sudden jump-cuts. scrollX/scrollY don't safely accept
// fn-args here (see Hydra-gotchas memory), so static rebuild is the path.
function buildPatch(snapX, snapY) {
  if (!hydra) return;
  try {
    grid().repeat(40, 40)
      // moiré: mismatched 41x41 grid rotated slightly. diff cancels
      // coincident lines, dark voids sweep as alignment shifts with zoom.
      .diff(grid().repeat(41, 41).rotate(0.07))
      // static-amount noise warp — organic wobble on every line.
      .modulate(noise(3, 0.4), 0.012)
      .scale(() => Math.pow(2, (time * 0.08) % 1) * (1 - (window.__low || 0) * 0.15))
      // jitter snap — static offset each rebuild. 0 most of the time;
      // briefly non-zero during a snap event.
      .scrollX(snapX)
      .scrollY(snapY)
      .thresh(0.5, 0.001)
      // bass-triggered invert — only fires on the very peak of the kick
      // transient (>0.9). aim is a brief flash rather than sustained white.
      .invert(() => (window.__low || 0) > 0.9 ? 1 : 0)
      .out();
  } catch (e) {
    console.error("hydra patch failed:", e);
  }
}

// initial neutral patch — no scroll offset.
buildPatch(0, 0);

// Time-jittered scroll snaps. Every 700ms, 15% chance of a snap event:
// rebuild the chain with a random scroll offset (±15% in each axis),
// hold for ~100ms, rebuild back to zero. Avg ~1 snap every 5s.
// Hydra should reclaim old chain GLSL programs across rebuilds; if not,
// memory will grow slowly — watch for over a long session.
setInterval(() => {
  if (Math.random() < 0.15) {
    const sx = (Math.random() - 0.5) * 0.3;
    const sy = (Math.random() - 0.5) * 0.3;
    buildPatch(sx, sy);
    setTimeout(() => buildPatch(0, 0), 100);
  }
}, 700);

// ---- strudel bridge: default patch + play/pause ----
const DEFAULT_PATCH = `stack(
  s("bd*<2 4 2 4>").gain(0.95).shape(0.4),
  s("hh*16").gain(0.55).pan(rand),
  s("~ cp ~ cp").gain(0.7).crush(4),
  note("<c2 g1 ab1 eb2>").s("sawtooth").cutoff(perlin.range(300, 1800).slow(4)).gain(0.4).distort(1.2),
  note("<c4 eb4 g4 bb4>(3,8)").s("square").delay(0.4).room(0.7).gain(0.18)
).cpm(110/4)`;

function getStrudelEditor() {
  const el = document.querySelector("strudel-editor");
  return el && el.editor;
}

document.getElementById("btn-play").addEventListener("click", () => {
  const ed = getStrudelEditor();
  if (!ed) return;
  if (typeof ed.evaluate === "function") ed.evaluate();
  else if (typeof ed.start === "function") ed.start();
});
document.getElementById("btn-pause").addEventListener("click", () => {
  const ed = getStrudelEditor();
  if (ed && typeof ed.stop === "function") ed.stop();
});

(async function bootEditor() {
  await customElements.whenDefined("strudel-editor");
  const el = document.querySelector("strudel-editor");
  for (let i = 0; i < 50 && !el.editor; i++) await new Promise(r => setTimeout(r, 50));
  if (el.editor && typeof el.editor.setCode === "function") {
    el.editor.setCode(DEFAULT_PATCH);
  }
})();
</script>
