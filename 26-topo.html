<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // topo</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // topo">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/26-topo.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // topo">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">topo · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">levels</span><span class="val"></span>
    <input type="range" min="2" max="16" step="1" data-k="levels">
  </label>
  <label>
    <span class="name">detail</span><span class="val"></span>
    <input type="range" min="80" max="220" step="2" data-k="detail">
  </label>
  <label>
    <span class="name">crawl</span><span class="val"></span>
    <input type="range" min="0" max="60" step="0.5" data-k="crawl">
  </label>
  <label>
    <span class="name">weight</span><span class="val"></span>
    <input type="range" min="0.5" max="4" step="0.05" data-k="weight">
  </label>
  <label>
    <span class="name">audio shift</span><span class="val"></span>
    <input type="range" min="0" max="120" step="1" data-k="audioShift">
  </label>
</div>

<script src="core.js"></script>
<script>
// topo — the source luma field read as terrain: marching-squares iso-lines at
// N levels turn the feed into a topographic map. The whole level set scrolls
// (crawl) and intensity() shoves it further, so contours slide across faces
// and objects with the music. All geometry rebuilt per frame from a small
// smoothed luma grid; no timers — deterministic under the offline renderer.
const { intensity, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry, hazeAlongLine, drawSoftDot } = Newspeech;
installInputs();

const params = {
  levels: 7,
  detail: 140,
  crawl: 12,
  weight: 1.5,
  audioShift: 40,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// luma grid — width follows the detail param, height follows viewport aspect.
let GW = 0, GH = 0;
let lumaA = null, lumaB = null; // field + blur scratch
const gridCanvas = document.createElement("canvas");
const gridCtx = gridCanvas.getContext("2d", { willReadFrequently: true });

function rebuildGrid() {
  if (!cw || !ch) return;
  GW = Math.max(16, Math.round(params.detail));
  GH = Math.max(16, Math.round(GW * ch / cw));
  gridCanvas.width = GW;
  gridCanvas.height = GH;
  lumaA = new Float32Array(GW * GH);
  lumaB = new Float32Array(GW * GH);
}

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.clearRect(0, 0, cw, ch);
  rebuildGrid();
}
window.addEventListener("resize", resize);

function sampleLuma(src) {
  const scale = Math.max(GW / imgW, GH / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  gridCtx.fillStyle = "#000";
  gridCtx.fillRect(0, 0, GW, GH);
  gridCtx.drawImage(src, (GW - drawW) * 0.5, (GH - drawH) * 0.5, drawW, drawH);
  const data = gridCtx.getImageData(0, 0, GW, GH).data;
  for (let i = 0, p = 0; i < lumaA.length; i++, p += 4) {
    lumaA[i] = data[p] * 0.299 + data[p + 1] * 0.587 + data[p + 2] * 0.114;
  }
  // box blur (radius 1), run twice, so contours trace forms, not sensor noise.
  for (let pass = 0; pass < 2; pass++) {
    for (let y = 0; y < GH; y++) {
      const row = y * GW;
      for (let x = 0; x < GW; x++) {
        const x0 = x > 0 ? x - 1 : 0;
        const x1 = x < GW - 1 ? x + 1 : GW - 1;
        lumaB[row + x] = (lumaA[row + x0] + lumaA[row + x] + lumaA[row + x1]) / 3;
      }
    }
    for (let y = 0; y < GH; y++) {
      const y0 = y > 0 ? y - 1 : 0;
      const y1 = y < GH - 1 ? y + 1 : GH - 1;
      for (let x = 0; x < GW; x++) {
        lumaA[y * GW + x] = (lumaB[y0 * GW + x] + lumaB[y * GW + x] + lumaB[y1 * GW + x]) / 3;
      }
    }
  }
}

let offset = 0; // scrolling iso offset, luma units

// haze accents — a sparse sample of contour segments gets hazeAlongLine so
// the global haze slider shapes the map; capped hard for perf.
const hazeSegs = [];
const HAZE_MAX = 36;

function drawContours() {
  const n = Math.max(2, Math.round(params.levels));
  const sx = cw / (GW - 1);
  const sy = ch / (GH - 1);
  const l = lumaA;
  hazeSegs.length = 0;

  // iso levels normalized to the frame's ACTUAL luma range — fixed 0..255
  // spacing leaves dark/flat footage nearly contour-free.
  let fmn = 255, fmx = 0;
  for (let i = 0; i < l.length; i++) {
    const v = l[i];
    if (v < fmn) fmn = v;
    if (v > fmx) fmx = v;
  }
  const span = fmx - fmn;
  if (span < 6) return; // flat frame, nothing to trace

  const phaseShift = (offset + intensity() * params.audioShift) / 255;
  const paths = [];
  const isos = [];
  for (let i = 0; i < n; i++) {
    const u = ((i + 0.5) / n + phaseShift) % 1;
    isos.push(fmn + u * span);
    paths.push(new Path2D());
  }

  for (let y = 0; y < GH - 1; y++) {
    const row = y * GW;
    for (let x = 0; x < GW - 1; x++) {
      const a = l[row + x];           // tl
      const b = l[row + x + 1];       // tr
      const c = l[row + GW + x + 1];  // br
      const d = l[row + GW + x];      // bl
      let mn = a < b ? a : b; if (c < mn) mn = c; if (d < mn) mn = d;
      let mx = a > b ? a : b; if (c > mx) mx = c; if (d > mx) mx = d;

      for (let i = 0; i < n; i++) {
        const iso = isos[i];
        if (iso <= mn || iso >= mx) continue;
        const idx = (a > iso ? 8 : 0) | (b > iso ? 4 : 0) | (c > iso ? 2 : 0) | (d > iso ? 1 : 0);
        if (idx === 0 || idx === 15) continue;
        const p = paths[i];
        // lerped edge crossings, in grid space
        const tx = x + (iso - a) / (b - a), ty = y;               // top
        const rx = x + 1, ry = y + (iso - b) / (c - b);           // right
        const bx = x + (iso - d) / (c - d), by = y + 1;           // bottom
        const lx = x, ly = y + (iso - a) / (d - a);               // left
        let x1, y1, x2, y2, x3, y3, x4, y4, two = false;
        switch (idx) {
          case 1:  x1 = lx; y1 = ly; x2 = bx; y2 = by; break;
          case 2:  x1 = bx; y1 = by; x2 = rx; y2 = ry; break;
          case 3:  x1 = lx; y1 = ly; x2 = rx; y2 = ry; break;
          case 4:  x1 = tx; y1 = ty; x2 = rx; y2 = ry; break;
          case 5:  x1 = tx; y1 = ty; x2 = rx; y2 = ry; x3 = lx; y3 = ly; x4 = bx; y4 = by; two = true; break;
          case 6:  x1 = tx; y1 = ty; x2 = bx; y2 = by; break;
          case 7:  x1 = tx; y1 = ty; x2 = lx; y2 = ly; break;
          case 8:  x1 = tx; y1 = ty; x2 = lx; y2 = ly; break;
          case 9:  x1 = tx; y1 = ty; x2 = bx; y2 = by; break;
          case 10: x1 = tx; y1 = ty; x2 = lx; y2 = ly; x3 = rx; y3 = ry; x4 = bx; y4 = by; two = true; break;
          case 11: x1 = tx; y1 = ty; x2 = rx; y2 = ry; break;
          case 12: x1 = lx; y1 = ly; x2 = rx; y2 = ry; break;
          case 13: x1 = rx; y1 = ry; x2 = bx; y2 = by; break;
          case 14: x1 = lx; y1 = ly; x2 = bx; y2 = by; break;
        }
        p.moveTo(x1 * sx, y1 * sy);
        p.lineTo(x2 * sx, y2 * sy);
        if (two) {
          p.moveTo(x3 * sx, y3 * sy);
          p.lineTo(x4 * sx, y4 * sy);
        }
        if (hazeSegs.length < HAZE_MAX && Math.random() < 0.006) {
          hazeSegs.push([x1 * sx, y1 * sy, x2 * sx, y2 * sy]);
        }
      }
    }
  }

  ctx.strokeStyle = "#fff";
  ctx.lineWidth = params.weight * dpr;
  for (let i = 0; i < n; i++) {
    ctx.globalAlpha = 0.4 + 0.5 * ((isos[i] - fmn) / span); // deeper (darker) levels dimmer
    ctx.stroke(paths[i]);
  }
  ctx.globalAlpha = 1;

  for (const s of hazeSegs) {
    hazeAlongLine(ctx, s[0], s[1], s[2], s[3], { samples: 3, jitter: 6 * dpr, alpha: 0.08, size: 1.3 });
  }
}

function step(dt) {
  const env = intensity();
  ctx.clearRect(0, 0, cw, ch);
  offset = (offset + dt * params.crawl) % 255;

  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (src && imgW > 0 && GW > 0) {
    sampleLuma(src);
    drawContours();
  } else {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
  }

  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

window.onParamChange = (k) => {
  if (k === "detail") rebuildGrid();
};
installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});
</script>
</body>
</html>
