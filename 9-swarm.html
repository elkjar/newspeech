<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">swarm · params · [0] toggle</div>
  <label>
    <span class="name">particle count</span><span class="val"></span>
    <input type="range" min="0.1" max="6" step="0.05" data-k="particleMul">
  </label>
  <label>
    <span class="name">speed multiplier</span><span class="val"></span>
    <input type="range" min="0.1" max="8" step="0.05" data-k="speedMul">
  </label>
  <label>
    <span class="name">directions</span><span class="val"></span>
    <input type="range" min="4" max="64" step="1" data-k="directions">
  </label>
  <label>
    <span class="name">kick rate</span><span class="val"></span>
    <input type="range" min="0" max="4" step="0.01" data-k="kickRate">
  </label>
  <label>
    <span class="name">trail fade</span><span class="val"></span>
    <input type="range" min="0.1" max="8" step="0.05" data-k="fadeMul">
  </label>
  <label>
    <span class="name">bright particle ratio</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="brightRatio">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, bumpActivity, installPanel, installTelemetry, tickTelemetry, installMarkers, tickMarkers } = Newspeech;
// swarm uses lighter mouse coupling (mouse weight 0.3 vs default 0.4) and
// slightly slower decay than other 2D pages.
installInputs({ moveSensitivity: 0.003, decay: 1.0, intensityMouseWeight: 0.3 });

const params = {
  particleMul: 1,
  speedMul: 1,
  directions: 8,
  kickRate: 0.04,
  fadeMul: 1,
  brightRatio: 0.05,
};

// ---- canvas: draw at device-pixel resolution, no scale transform ----
// each particle is exactly one device pixel.
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr;  // CSS px viewport
let cw, ch;             // device-pixel canvas dimensions

let particles = [];

// quantize movement to N cardinal/diagonal directions for a digital feel
function quantize(ang) {
  const dirs = Math.max(1, Math.round(params.directions));
  const step = (Math.PI * 2) / dirs;
  return Math.round(ang / step) * step;
}

function makeParticle(x, y) {
  return {
    x: x !== undefined ? x : Math.random() * cw,
    y: y !== undefined ? y : Math.random() * ch,
    dir: Math.random() * Math.PI * 2, // re-set on first field sample
    distSinceTurn: 1e9,               // force immediate field sample on first tick
    nextTurn: 6 + Math.random() * 24, // device-px to travel before re-sampling
    age: 0,
    life: 0.8 + Math.random() * 2.6, // seconds
    bright: Math.random() < params.brightRatio,
  };
}

function targetParticleCount() {
  const base = Math.min(9000, Math.max(1500, Math.floor(cw * ch / 900)));
  return Math.max(1, Math.round(base * params.particleMul));
}
function adjustParticleCount() {
  const target = targetParticleCount();
  while (particles.length < target) particles.push(makeParticle());
  if (particles.length > target) particles.length = target;
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;

  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  // NO setTransform — work in raw device pixels so 1px = 1 device pixel
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);

  // density tuned for 1-device-pixel dots; trails do most of the visual work
  adjustParticleCount();
}
window.addEventListener("resize", resize);

// ---- flow field: layered sin pseudo-noise → angle ----
function field(x, y, t) {
  const u = x / cw;
  const v = y / ch;
  const a = Math.sin(u * 6.0 + t * 0.00031);
  const b = Math.sin(v * 5.0 - t * 0.00023);
  const c = Math.sin((u + v) * 4.0 + t * 0.00041);
  const d = Math.sin((u - v) * 7.0 - t * 0.00017);
  return (a + b + 0.6 * c + 0.4 * d) * Math.PI;
}

// ---- field "kicks" — temporary directional bias ----
let kickPhase = 0;
let kickAmount = 0;
function applyKick() {
  kickPhase = Math.random() * Math.PI * 2;
  kickAmount = 0.6 + Math.random() * 0.6;
}
poisson(() => params.kickRate + 0.08 * intensity(), applyKick);

// ---- step ----
function step(dt) {
  const t = performance.now();
  const env = intensity();

  // trail fade — longer trails when calm. destination-out subtracts alpha
  // from existing pixels so trails decay toward transparent (revealing
  // bg-grid through the gaps), not toward an opaque dark layer.
  const fadeAlpha = Math.min(0.4, (1.6 + 2.4 * (1 - env)) * dt * params.fadeMul);
  ctx.save();
  ctx.globalCompositeOperation = "destination-out";
  ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
  ctx.fillRect(0, 0, cw, ch);
  ctx.restore();

  // motion speed in CSS px / sec → multiply by dpr for device-px space
  const speedCss = (90 + 180 * env) * params.speedMul;
  const speed = speedCss * dpr;

  kickAmount *= Math.pow(0.5, dt / 0.7);

  for (const p of particles) {
    // re-sample field only after committing to a direction for some distance
    if (p.distSinceTurn >= p.nextTurn) {
      let raw = field(p.x, p.y, t);
      if (kickAmount > 0.02) raw += kickAmount * Math.sin(kickPhase);
      p.dir = quantize(raw);
      p.distSinceTurn = 0;
      p.nextTurn = 6 + Math.random() * 24;
    }
    const dx = Math.cos(p.dir) * speed * dt;
    const dy = Math.sin(p.dir) * speed * dt;
    p.x += dx;
    p.y += dy;
    p.distSinceTurn += Math.hypot(dx, dy);
    p.age += dt;

    if (p.x < 0) p.x += cw;
    else if (p.x >= cw) p.x -= cw;
    if (p.y < 0) p.y += ch;
    else if (p.y >= ch) p.y -= ch;

    if (p.age > p.life) {
      p.x = Math.random() * cw;
      p.y = Math.random() * ch;
      p.age = 0;
      p.life = 0.8 + Math.random() * 2.6;
      p.bright = Math.random() < params.brightRatio;
      p.distSinceTurn = 1e9;
    }

    const xi = p.x | 0;
    const yi = p.y | 0;
    if (p.bright) {
      ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
      ctx.fillRect(xi, yi, 1, 1);
    } else {
      const ageK = 1 - Math.min(1, p.age / p.life);
      const a = 0.45 + 0.35 * ageK;
      ctx.fillStyle = `rgba(220, 220, 220, ${a.toFixed(3)})`;
      ctx.fillRect(xi, yi, 1, 1);
    }
  }
}

// ---- RAF loop ----
let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  tickMarkers(dt);
  tickTelemetry(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  const cx = e.clientX * dpr;
  const cy = e.clientY * dpr;
  const burst = 200;
  const radius = 40 * dpr;
  for (let i = 0; i < burst; i++) {
    const r = Math.pow(Math.random(), 0.5) * radius;
    const a = Math.random() * Math.PI * 2;
    const idx = (Math.random() * particles.length) | 0;
    particles[idx] = makeParticle(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    if (Math.random() < 0.15) particles[idx].bright = true;
  }
  applyKick();
  bumpActivity();
});

window.onParamChange = (k) => {
  if (k === "particleMul") adjustParticleCount();
};

installMarkers({ params });
installTelemetry({ params });
installPanel(params);
</script>
</body>
</html>
