<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel" hidden>
  <div class="panel-title">stars · params · [0] toggle</div>
  <label>
    <span class="name">star count</span><span class="val"></span>
    <input type="range" min="100" max="2000" step="10" data-k="starCount">
  </label>
  <label>
    <span class="name">speed multiplier</span><span class="val"></span>
    <input type="range" min="0.1" max="4" step="0.05" data-k="speedMul">
  </label>
  <label>
    <span class="name">glitch chance</span><span class="val"></span>
    <input type="range" min="0" max="0.2" step="0.005" data-k="glitchChance">
  </label>
  <label>
    <span class="name">h-flash chance</span><span class="val"></span>
    <input type="range" min="0" max="0.2" step="0.005" data-k="hFlashChance">
  </label>
  <label>
    <span class="name">v-flash chance</span><span class="val"></span>
    <input type="range" min="0" max="0.2" step="0.005" data-k="vFlashChance">
  </label>
  <label>
    <span class="name">invert flash chance</span><span class="val"></span>
    <input type="range" min="0" max="0.02" step="0.0005" data-k="invertChance">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, installInputs, tickInputs, bumpActivity, installPanel } = Newspeech;
installInputs();

const params = {
  starCount: 700,
  speedMul: 1,
  glitchChance: 0.025,
  hFlashChance: 0.030,
  vFlashChance: 0.018,
  invertChance: 0.0025,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let viewW, viewH, dpr;

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---- ASCII starfield ----
const STAR_DEPTH_CHARS = ".,'+*oO@#";
const STAR_GLITCH_CHARS = "/\\|=~<>?!*#";
let stars = null;
function initStars() {
  const num = Math.max(1, Math.round(params.starCount));
  stars = [];
  for (let i = 0; i < num; i++) stars.push(spawnStar(true));
}
function adjustStarCount() {
  if (!stars) return;
  const target = Math.max(1, Math.round(params.starCount));
  while (stars.length < target) stars.push(spawnStar(true));
  if (stars.length > target) stars.length = target;
}
function spawnStar(scattered) {
  return {
    x: (Math.random() - 0.5) * 2,
    y: (Math.random() - 0.5) * 2,
    z: scattered ? Math.random() * 0.95 + 0.05 : 1,
    speed: 0.12 + Math.random() * 0.55,
    held: null,
    holdUntil: 0,
  };
}
function drawStars(t, dt) {
  if (!stars) initStars();
  ctx.fillStyle = "rgba(5, 5, 5, 0.42)";
  ctx.fillRect(0, 0, viewW, viewH);

  ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, monospace";
  ctx.textBaseline = "middle";
  ctx.textAlign = "center";

  const env = intensity();
  const cx = viewW / 2;
  const cy = viewH / 2;

  const warpKick = Math.random() < 0.012 ? (3 + Math.random() * 2) : 1;

  for (const s of stars) {
    s.z -= s.speed * dt * (0.6 + 0.8 * env) * warpKick * params.speedMul;
    if (s.z <= 0.02) {
      Object.assign(s, spawnStar(false));
      continue;
    }
    const px = cx + (s.x / s.z) * (viewW * 0.5);
    const py = cy + (s.y / s.z) * (viewH * 0.5);
    if (px < -30 || px > viewW + 30 || py < -30 || py > viewH + 30) continue;

    const idx = Math.min(STAR_DEPTH_CHARS.length - 1,
      Math.max(0, Math.floor((1 - s.z) * STAR_DEPTH_CHARS.length)));
    let ch = STAR_DEPTH_CHARS[idx];

    let glitched = false;
    if (s.held && t < s.holdUntil) {
      ch = s.held;
      glitched = true;
    } else if (Math.random() < params.glitchChance + 0.035 * env) {
      s.held = STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0];
      s.holdUntil = t + 50 + Math.random() * 110;
      ch = s.held;
      glitched = true;
    } else {
      s.held = null;
    }

    const a = Math.min(1, 1.05 - s.z * 0.7);
    ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    ctx.fillText(ch, px, py);

    if (glitched) {
      ctx.globalAlpha = a * 0.55;
      ctx.fillText(STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0], px, py - 14);
      ctx.globalAlpha = a * 0.30;
      ctx.fillText(STAR_GLITCH_CHARS[(Math.random() * STAR_GLITCH_CHARS.length) | 0], px, py - 28);
      ctx.globalAlpha = 1;
    }
  }

  if (Math.random() < params.hFlashChance) {
    const fy = Math.random() * viewH;
    const fh = 1 + Math.random() * 5;
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
    ctx.fillRect(0, fy, viewW, fh);
  }
  if (Math.random() < params.vFlashChance) {
    const fx = Math.random() * viewW;
    const fw = 1 + Math.random() * 4;
    ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
    ctx.fillRect(fx, 0, fw, viewH);
  }
  if (Math.random() < params.invertChance) {
    ctx.save();
    ctx.globalCompositeOperation = "difference";
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, viewW, viewH);
    ctx.restore();
  }
}

let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawStars(t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  bumpActivity();
});

window.onParamChange = (k) => {
  if (k === "starCount") adjustStarCount();
};

installPanel(params);
</script>
</body>
</html>
