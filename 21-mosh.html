<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // mosh</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // mosh">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/21-mosh.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // mosh">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">mosh · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">threshold</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="threshold">
  </label>
  <label>
    <span class="name">block size</span><span class="val"></span>
    <input type="range" min="2" max="20" step="1" data-k="blockSize">
  </label>
  <label>
    <span class="name">rot</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="rot">
  </label>
  <label>
    <span class="name">flush sense</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="flushSense">
  </label>
  <label>
    <span class="name">audio amount</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="audioAmt">
  </label>
</div>

<script src="core.js"></script>
<script>
// mosh — frame-difference datamosh. A held image only refreshes where the
// source has moved past a threshold; everything else freezes and rots
// (darkens + speckles) until an onset / intensity spike flushes the whole
// frame clean. Louder music lowers the threshold, so quiet passages stick
// and decay while loud ones pull the live feed back through.
const { intensity, onset, audioActive, drawSoftDot, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry } = Newspeech;
installInputs();

const params = {
  threshold: 0.4,
  blockSize: 4,
  rot: 0.5,
  flushSense: 0.5,
  audioAmt: 0.7,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// Working buffer follows the VIEWPORT aspect at a fixed pixel budget (720×405
// worth) — same pattern as 13-pixelsort, so portrait viewports aren't
// double-cover-cropped.
const PROC_BUDGET = 720 * 405;
let PROC_W = 720, PROC_H = 405;

const procCanvas = document.createElement("canvas");
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext("2d", { willReadFrequently: true });

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  held = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  const pw = Math.max(64, Math.round(Math.sqrt(PROC_BUDGET * (cw / ch))));
  const ph = Math.max(64, Math.round(PROC_BUDGET / pw));
  if (pw !== PROC_W || ph !== PROC_H) {
    PROC_W = pw;
    PROC_H = ph;
    procCanvas.width = PROC_W;
    procCanvas.height = PROC_H;
    // held pixels live in proc space — stale dimensions would blit garbage;
    // drop the buffer, it re-seeds from the next frame.
    held = null;
  }
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

// held frame + per-block stale ages. All refresh decisions happen per block
// (not per pixel) so the diff pass stays cheap and the look stays chunky.
let held = null;      // ImageData in proc space
let ages = null;      // Float32Array, seconds since each block last refreshed
let gridW = 0, gridH = 0, gridB = 0;
let flushPending = false;
let prevEnv = 0;
let flushCool = 0;

function ensureGrid() {
  const B = Math.max(2, Math.round(params.blockSize));
  const gw = Math.ceil(PROC_W / B);
  const gh = Math.ceil(PROC_H / B);
  if (B !== gridB || gw !== gridW || gh !== gridH) {
    gridB = B; gridW = gw; gridH = gh;
    ages = new Float32Array(gw * gh);
  }
}

function step(dt) {
  const env = intensity();
  ctx.clearRect(0, 0, cw, ch);

  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
    tickMarkers(dt);
    tickTelemetry(dt);
    return;
  }

  procCtx.fillStyle = "#000";
  procCtx.fillRect(0, 0, PROC_W, PROC_H);
  const scale = Math.max(PROC_W / imgW, PROC_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  procCtx.drawImage(src, (PROC_W - drawW) * 0.5, (PROC_H - drawH) * 0.5, drawW, drawH);
  const cur = procCtx.getImageData(0, 0, PROC_W, PROC_H);

  ensureGrid();

  // flush triggers: click, low/mid onset when the mic is on, or intensity
  // rising through a high bar when it's off (tempo pulses cross it on-beat).
  flushCool = Math.max(0, flushCool - dt);
  let flush = flushPending;
  flushPending = false;
  if (!flush && flushCool === 0 && params.flushSense > 0) {
    if (audioActive()) {
      flush = onset("low") || onset("mid");
    } else {
      const bar = 0.95 - params.flushSense * 0.35;
      flush = prevEnv < bar && env >= bar;
    }
    if (flush) flushCool = 2.2 - params.flushSense * 1.5;
  }
  prevEnv = env;

  if (!held || flush || held.width !== PROC_W || held.height !== PROC_H) {
    held = cur;
    if (ages) ages.fill(0);
  } else {
    const hd = held.data;
    const cd = cur.data;
    const B = gridB;
    // louder → lower threshold → more of the live feed pushes through.
    const effThr = (6 + params.threshold * 110) * (1 - 0.9 * params.audioAmt * env);
    const rotF = 1 - params.rot * 0.4 * dt;
    for (let by = 0; by < gridH; by++) {
      const y0 = by * B;
      const y1 = Math.min(PROC_H, y0 + B);
      for (let bx = 0; bx < gridW; bx++) {
        const x0 = bx * B;
        const x1 = Math.min(PROC_W, x0 + B);
        // mean abs green-channel diff (≈ luma), stride 2 in both axes.
        let sum = 0, n = 0;
        for (let y = y0; y < y1; y += 2) {
          let o = (y * PROC_W + x0) * 4 + 1;
          for (let x = x0; x < x1; x += 2, o += 8) {
            const d = cd[o] - hd[o];
            sum += d < 0 ? -d : d;
            n++;
          }
        }
        const gi = by * gridW + bx;
        if (n > 0 && sum / n > effThr) {
          for (let y = y0; y < y1; y++) {
            const ro = (y * PROC_W + x0) * 4;
            hd.set(cd.subarray(ro, ro + (x1 - x0) * 4), ro);
          }
          ages[gi] = 0;
        } else if (params.rot > 0) {
          ages[gi] += dt;
          for (let y = y0; y < y1; y++) {
            let o = (y * PROC_W + x0) * 4;
            for (let x = x0; x < x1; x++, o += 4) {
              hd[o] *= rotF;
              hd[o + 1] *= rotF;
              hd[o + 2] *= rotF;
            }
          }
          if (ages[gi] > 0.4 && Math.random() < params.rot * 0.12) {
            const sx = x0 + ((Math.random() * (x1 - x0)) | 0);
            const sy = y0 + ((Math.random() * (y1 - y0)) | 0);
            const so = (sy * PROC_W + sx) * 4;
            const v = Math.random() < 0.5 ? 255 : 0;
            hd[so] = hd[so + 1] = hd[so + 2] = v;
          }
        }
      }
    }
  }

  procCtx.putImageData(held, 0, 0);

  const mScale = Math.max(cw / PROC_W, ch / PROC_H);
  const mW = PROC_W * mScale;
  const mH = PROC_H * mScale;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(procCanvas, (cw - mW) * 0.5, (ch - mH) * 0.5, mW, mH);
  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  // click → flush the held frame for instant feedback
  flushPending = true;
});
</script>
</body>
</html>
