<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NEWSPEECH // repeat</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // repeat">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/20-repeat.html">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">repeat · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">loop length</span><span class="val"></span>
    <input type="range" min="2" max="16" step="1" data-k="loopLen">
  </label>
  <label>
    <span class="name">engage rate</span><span class="val"></span>
    <input type="range" min="0.05" max="3" step="0.05" data-k="engageRate">
  </label>
  <label>
    <span class="name">hold time</span><span class="val"></span>
    <input type="range" min="0.1" max="3" step="0.05" data-k="holdTime">
  </label>
  <label>
    <span class="name">ratchet</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="ratchet">
  </label>
  <label>
    <span class="name">audio boost</span><span class="val"></span>
    <input type="range" min="0" max="10" step="0.1" data-k="audioBoost">
  </label>
</div>

<script src="core.js"></script>
<script>
// repeat — a visual beat-repeat pedal. Live passthrough feeds a ring buffer of
// recent frames; on a trigger (beat-locked when a tempo is set, dt-spawned
// probability when free-running) playback freezes into a short micro-loop that
// stutters, optionally ratcheting (window halves over the hold), then releases
// back to live. Capture pauses during the loop so the window can't be
// overwritten mid-stutter.
const { intensity, bpm, beatPhase, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry, drawSoftDot } = Newspeech;
installInputs();

const params = {
  loopLen: 8,
  engageRate: 0.6,
  holdTime: 0.8,
  ratchet: 0.5,
  audioBoost: 3,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// Ring buffer follows the VIEWPORT aspect at a fixed pixel budget (480×270
// worth) — a fixed landscape buffer would double-cover-crop portrait viewports.
const RING_BUDGET = 480 * 270;
let RING_W = 480, RING_H = 270;
const RING_N = 96;
const ring = [];
for (let i = 0; i < RING_N; i++) {
  const c = document.createElement("canvas");
  c.width = RING_W; c.height = RING_H;
  ring.push(c);
}
let ringHead = 0;
let ringFilled = 0;

// loop state machine
let mode = "live";
let loopStart = 0, loopLen = 0, loopElapsed = 0, loopHold = 0, frameStep = 0;
let prevPhase = 0;

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
  ringHead = 0;
  ringFilled = 0;
  mode = "live";
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  const rw = Math.max(64, Math.round(Math.sqrt(RING_BUDGET * (cw / ch))));
  const rh = Math.max(64, Math.round(RING_BUDGET / rw));
  if (rw !== RING_W || rh !== RING_H) {
    RING_W = rw;
    RING_H = rh;
    // resizing clears each canvas; captured history is stale — drop it and any
    // loop that pointed into it.
    for (const c of ring) { c.width = RING_W; c.height = RING_H; }
    ringHead = 0;
    ringFilled = 0;
    mode = "live";
  }
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

function captureFrame(src) {
  const target = ring[ringHead];
  const tctx = target.getContext("2d");
  const scale = Math.max(RING_W / imgW, RING_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  tctx.fillStyle = "#000";
  tctx.fillRect(0, 0, RING_W, RING_H);
  tctx.drawImage(src, (RING_W - drawW) * 0.5, (RING_H - drawH) * 0.5, drawW, drawH);
  ringHead = (ringHead + 1) % RING_N;
  if (ringFilled < RING_N) ringFilled++;
}

function engageLoop(holdSeconds) {
  if (ringFilled < 2) return;
  const L = Math.max(2, Math.min(Math.round(params.loopLen), ringFilled));
  const newest = (ringHead - 1 + RING_N) % RING_N;
  loopStart = (newest - L + 1 + RING_N) % RING_N;
  loopLen = L;
  loopElapsed = 0;
  frameStep = 0;
  loopHold = Math.max(0.1, holdSeconds);
  mode = "loop";
}

function drawCover(image, iw, ih) {
  const scale = Math.max(cw / iw, ch / ih);
  const drawW = iw * scale;
  const drawH = ih * scale;
  ctx.drawImage(image, (cw - drawW) * 0.5, (ch - drawH) * 0.5, drawW, drawH);
}

function step(dt) {
  const env = intensity();
  ctx.clearRect(0, 0, cw, ch);

  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
    tickMarkers(dt);
    tickTelemetry(dt);
    return;
  }

  if (mode === "live") {
    captureFrame(src);

    const b = bpm();
    if (b > 0) {
      // beat-locked: engage only on beat boundaries so captures land on the
      // grid; hold rounds to a whole number of beats.
      const phase = beatPhase();
      const secPerBeat = 60 / b;
      if (phase < prevPhase) {
        const p = Math.min(1, params.engageRate * secPerBeat * (1 + env * params.audioBoost));
        if (Math.random() < p) {
          const beats = Math.max(1, Math.round(params.holdTime / secPerBeat));
          engageLoop(beats * secPerBeat);
        }
      }
      prevPhase = phase;
    } else {
      const rate = params.engageRate * (1 + env * params.audioBoost);
      if (Math.random() < rate * dt) engageLoop(params.holdTime);
    }
  }

  if (mode === "loop") {
    loopElapsed += dt;
    if (loopElapsed >= loopHold || ringFilled === 0) {
      mode = "live";
    } else {
      // ratchet: the loop window halves in stages over the hold — 8→4→2 at the
      // default — for a rush toward the release.
      const u = loopElapsed / loopHold;
      const halvings = Math.round(params.ratchet * 3);
      const stage = Math.min(halvings, Math.floor(u * (halvings + 1)));
      const w = Math.max(1, loopLen >> stage);
      const idx = (loopStart + (frameStep % w)) % RING_N;
      frameStep++;
      drawCover(ring[idx], RING_W, RING_H);

      // the tell: brightness lift + frame-edge flicker so the freeze reads as
      // intentional, alternating with the stutter.
      const flick = (frameStep & 1) ? 0.09 : 0.03;
      ctx.fillStyle = "#fff";
      ctx.globalAlpha = flick;
      ctx.fillRect(0, 0, cw, ch);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2 * dpr;
      ctx.globalAlpha = (frameStep & 1) ? 0.22 : 0.10;
      ctx.strokeRect(dpr, dpr, cw - 2 * dpr, ch - 2 * dpr);
      ctx.globalAlpha = 1;

      tickMarkers(dt);
      tickTelemetry(dt);
      return;
    }
  }

  drawCover(src, imgW, imgH);
  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  // click → force a loop right now (restarts the stutter if one is running)
  engageLoop(params.holdTime);
});
</script>
</body>
</html>
