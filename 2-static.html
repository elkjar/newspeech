<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio experimentation.">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">static · params · [0] toggle</div>
  <label>
    <span class="name">density base</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="densityBase">
  </label>
  <label>
    <span class="name">density · intensity</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="densityEnv">
  </label>
  <label>
    <span class="name">bright cutoff</span><span class="val"></span>
    <input type="range" min="0" max="255" step="1" data-k="brightCutoff">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, installInputs, tickInputs, bumpActivity, installPanel, installTelemetry, tickTelemetry, installMarkers, tickMarkers } = Newspeech;
installInputs();

const params = {
  densityBase: 0.10,
  densityEnv: 0.20,
  brightCutoff: 180,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let viewW, viewH, dpr;

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---- static (TV snow) ----
const STATIC_W = 480, STATIC_H = 270;
let staticCanvas, staticCtx, staticImg;
function initStatic() {
  staticCanvas = document.createElement("canvas");
  staticCanvas.width = STATIC_W;
  staticCanvas.height = STATIC_H;
  staticCtx = staticCanvas.getContext("2d");
  staticImg = staticCtx.createImageData(STATIC_W, STATIC_H);
  const d = staticImg.data;
  for (let i = 0; i < d.length; i += 4) { d[i] = d[i+1] = d[i+2] = 255; }
}
function drawStatic(t, dt) {
  if (!staticImg) initStatic();
  const env = intensity();
  const density = params.densityBase + params.densityEnv * env;
  const d = staticImg.data;
  for (let i = 3; i < d.length; i += 4) {
    if (Math.random() < density) {
      const r = Math.random();
      d[i] = (r * r * params.brightCutoff) | 0;
    } else {
      d[i] = 0;
    }
  }
  staticCtx.putImageData(staticImg, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);
  ctx.drawImage(staticCanvas, 0, 0, viewW, viewH);
}

let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawStatic(t, dt);
  tickMarkers(dt);
  tickTelemetry(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  bumpActivity();
});

installMarkers({ params });
installTelemetry({ params });
installPanel(params);
</script>
</body>
</html>
