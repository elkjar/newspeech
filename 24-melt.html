<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // melt</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // melt">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/24-melt.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // melt">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">melt · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">amount</span><span class="val"></span>
    <input type="range" min="0" max="150" step="1" data-k="amount">
  </label>
  <label>
    <span class="name">scale</span><span class="val"></span>
    <input type="range" min="1" max="8" step="0.1" data-k="scale">
  </label>
  <label>
    <span class="name">speed</span><span class="val"></span>
    <input type="range" min="0" max="3" step="0.01" data-k="speed">
  </label>
  <label>
    <span class="name">axis (rows/cols)</span><span class="val"></span>
    <input type="range" min="0" max="1" step="1" data-k="axis">
  </label>
  <label>
    <span class="name">audio amount</span><span class="val"></span>
    <input type="range" min="0" max="3" step="0.05" data-k="audioAmt">
  </label>
</div>

<script src="core.js"></script>
<script>
// melt — luma-driven displacement warp. The frame is downsampled into a tiny
// blurred control field; each output row (or column) is shifted by the field's
// brightness at a slowly scrolling sample position, so the image smears along
// its own light. intensity() scales the displacement; clicks surge it.
const { intensity, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry, drawSoftDot } = Newspeech;
installInputs();

const params = {
  amount: 60,
  scale: 3,
  speed: 0.5,
  axis: 0,
  audioAmt: 1.2,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

// proc buffer follows the VIEWPORT aspect at a fixed pixel budget (see
// 13-pixelsort — a fixed landscape buffer double-cover-crops portrait views).
const PROC_BUDGET = 720 * 405;
let PROC_W = 720, PROC_H = 405;

const procCanvas = document.createElement("canvas");
procCanvas.width = PROC_W; procCanvas.height = PROC_H;
const procCtx = procCanvas.getContext("2d");

const outCanvas = document.createElement("canvas");
outCanvas.width = PROC_W; outCanvas.height = PROC_H;
const outCtx = outCanvas.getContext("2d");

// control field: tiny luma canvas + half-size scratch used as a cheap
// cross-platform box blur (down-up drawImage; ctx.filter no-ops on older
// mobile Safari so it is avoided entirely).
const ctlCanvas = document.createElement("canvas");
const ctlCtx = ctlCanvas.getContext("2d", { willReadFrequently: true });
const scratchCanvas = document.createElement("canvas");
const scratchCtx = scratchCanvas.getContext("2d");
let ctlW = 4, ctlH = 4;

function rebuildCtl() {
  const f = 4 * Math.max(1, params.scale);
  ctlW = Math.max(4, Math.round(PROC_W / f));
  ctlH = Math.max(4, Math.round(PROC_H / f));
  ctlCanvas.width = ctlW;
  ctlCanvas.height = ctlH;
  scratchCanvas.width = Math.max(2, ctlW >> 1);
  scratchCanvas.height = Math.max(2, ctlH >> 1);
}

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  const pw = Math.max(64, Math.round(Math.sqrt(PROC_BUDGET * (cw / ch))));
  const ph = Math.max(64, Math.round(PROC_BUDGET / pw));
  if (pw !== PROC_W || ph !== PROC_H) {
    PROC_W = pw;
    PROC_H = ph;
    procCanvas.width = PROC_W;
    procCanvas.height = PROC_H;
    outCanvas.width = PROC_W;
    outCanvas.height = PROC_H;
  }
  rebuildCtl();
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

window.onParamChange = (k) => {
  if (k === "scale") rebuildCtl();
};

let scroll = 0;   // control-field sample offset, wraps [0,1)
let surge = 0;    // click spike, exp-decays over ~1s

const SLAB = 2;

function step(dt) {
  const env = intensity();
  surge *= Math.exp(-3 * dt);
  scroll = (scroll + params.speed * dt * 0.35) % 1;

  ctx.clearRect(0, 0, cw, ch);

  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (!src || imgW === 0) {
    // no source yet — breathing signal glow so the page reads before a pick
    // (raw alpha: must stay visible with the haze slider at 0).
    const r = Math.min(cw, ch);
    drawSoftDot(ctx, cw * 0.5, ch * 0.5, r * (0.7 + 0.15 * env), 0.28 + 0.3 * env, true);
    tickMarkers(dt);
    tickTelemetry(dt);
    return;
  }

  // cover-fit src into proc canvas
  procCtx.fillStyle = "#000";
  procCtx.fillRect(0, 0, PROC_W, PROC_H);
  const scale = Math.max(PROC_W / imgW, PROC_H / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  procCtx.drawImage(src, (PROC_W - drawW) * 0.5, (PROC_H - drawH) * 0.5, drawW, drawH);

  // refresh + blur the control field (down-up pass), then sample it
  ctlCtx.drawImage(procCanvas, 0, 0, ctlW, ctlH);
  scratchCtx.drawImage(ctlCanvas, 0, 0, scratchCanvas.width, scratchCanvas.height);
  ctlCtx.drawImage(scratchCanvas, 0, 0, ctlW, ctlH);
  const d = ctlCtx.getImageData(0, 0, ctlW, ctlH).data;

  const eff = params.amount * (0.55 + env * params.audioAmt) * (1 + 1.8 * surge);
  const lum = (i) => d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;

  outCtx.fillStyle = "#000";
  outCtx.fillRect(0, 0, PROC_W, PROC_H);

  if (params.axis < 0.5) {
    // rows displaced horizontally, wrap-around so no edge gaps
    for (let y = 0; y < PROC_H; y += SLAB) {
      const h = Math.min(SLAB, PROC_H - y);
      const row = (((y / PROC_H + scroll) % 1) * ctlH) | 0;
      const base = row * ctlW * 4;
      const l = (lum(base + (((ctlW * 0.25) | 0) * 4)) + lum(base + (((ctlW * 0.5) | 0) * 4)) + lum(base + (((ctlW * 0.75) | 0) * 4))) / 3;
      const off = Math.round((l / 255 - 0.5) * 2 * eff);
      outCtx.drawImage(procCanvas, 0, y, PROC_W, h, off, y, PROC_W, h);
      if (off > 0) outCtx.drawImage(procCanvas, 0, y, PROC_W, h, off - PROC_W, y, PROC_W, h);
      else if (off < 0) outCtx.drawImage(procCanvas, 0, y, PROC_W, h, off + PROC_W, y, PROC_W, h);
    }
  } else {
    // columns displaced vertically
    for (let x = 0; x < PROC_W; x += SLAB) {
      const w = Math.min(SLAB, PROC_W - x);
      const col = (((x / PROC_W + scroll) % 1) * ctlW) | 0;
      const c4 = col * 4;
      const rowStride = ctlW * 4;
      const l = (lum((((ctlH * 0.25) | 0) * rowStride) + c4) + lum((((ctlH * 0.5) | 0) * rowStride) + c4) + lum((((ctlH * 0.75) | 0) * rowStride) + c4)) / 3;
      const off = Math.round((l / 255 - 0.5) * 2 * eff);
      outCtx.drawImage(procCanvas, x, 0, w, PROC_H, x, off, w, PROC_H);
      if (off > 0) outCtx.drawImage(procCanvas, x, 0, w, PROC_H, x, off - PROC_H, w, PROC_H);
      else if (off < 0) outCtx.drawImage(procCanvas, x, 0, w, PROC_H, x, off + PROC_H, w, PROC_H);
    }
  }

  // upscale out → main, cover-fit
  const mScale = Math.max(cw / PROC_W, ch / PROC_H);
  const mW = PROC_W * mScale;
  const mH = PROC_H * mScale;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(outCanvas, (cw - mW) * 0.5, (ch - mH) * 0.5, mW, mH);

  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  surge = 1;
});
</script>
</body>
</html>
