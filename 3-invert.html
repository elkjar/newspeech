<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel" hidden>
  <div class="panel-title">invert · params · [0] toggle</div>
  <label>
    <span class="name">scroll speed</span><span class="val"></span>
    <input type="range" min="0" max="3" step="0.01" data-k="scrollSpeed">
  </label>
  <label>
    <span class="name">streak density</span><span class="val"></span>
    <input type="range" min="0.1" max="3" step="0.01" data-k="streakDensity">
  </label>
  <label>
    <span class="name">block count</span><span class="val"></span>
    <input type="range" min="0" max="24" step="1" data-k="blockCount">
  </label>
  <label>
    <span class="name">block reroll (ms)</span><span class="val"></span>
    <input type="range" min="80" max="3000" step="10" data-k="rerollMs">
  </label>
  <label>
    <span class="name">texture rebuild rate</span><span class="val"></span>
    <input type="range" min="0" max="2" step="0.01" data-k="textureRate">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, bumpActivity, installPanel } = Newspeech;
installInputs();

const params = {
  scrollSpeed: 0.5,
  streakDensity: 1,
  blockCount: 8,
  rerollMs: 550,
  textureRate: 0.18,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
const tex = document.createElement("canvas");
const tctx = tex.getContext("2d");

let viewW, viewH, dpr;
let scrollY = 0;

function buildTexture() {
  const w = viewW;
  const h = viewH * 2;
  tex.width = w;
  tex.height = h;

  tctx.fillStyle = "#050505";
  tctx.fillRect(0, 0, w, h);

  const numStreaks = Math.floor(h * 2.5 * params.streakDensity);
  for (let i = 0; i < numStreaks; i++) {
    const y = (Math.random() * h) | 0;
    const xStart = Math.random() * w;
    const xLen = 30 + Math.random() * (w * 0.7);
    const a = Math.pow(Math.random(), 4) * 0.5 + 0.006;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(xStart, y, xLen, 1);
  }

  for (let i = 0; i < 5; i++) {
    const y = (Math.random() * h) | 0;
    const a = 0.25 + Math.random() * 0.45;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(0, y, w, 1 + ((Math.random() * 2) | 0));
  }
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildTexture();
}
window.addEventListener("resize", resize);
resize();

poisson(() => params.textureRate + 0.35 * intensity(), () => buildTexture());

// ---- invert blocks ----
let invertBlocks = null;
let invertRerollAt = 0;
function rerollInvertBlocks(t) {
  invertBlocks = [];
  const num = Math.max(0, Math.round(params.blockCount));
  for (let i = 0; i < num; i++) {
    invertBlocks.push({
      x: ((Math.random() * viewW) | 0) - 80,
      y: ((Math.random() * viewH) | 0) - 30,
      w: 100 + ((Math.random() * 360) | 0),
      h: 40 + ((Math.random() * 200) | 0),
    });
  }
  invertRerollAt = t + params.rerollMs * 0.45 + Math.random() * params.rerollMs * 1.1;
}
function drawInvert(t, dt) {
  if (!tex.width) return;
  if (!invertBlocks || t > invertRerollAt) rerollInvertBlocks(t);

  const env = intensity();
  const scroll = params.scrollSpeed * (0.5 + 0.8 * env);
  scrollY = (scrollY + scroll * dt) % viewH;

  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, viewW, viewH);
  ctx.drawImage(tex, 0, scrollY, viewW, viewH, 0, 0, viewW, viewH);

  ctx.save();
  ctx.globalCompositeOperation = "difference";
  ctx.fillStyle = "#ffffff";
  for (const b of invertBlocks) ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.restore();
}

let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawInvert(t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  buildTexture();
  rerollInvertBlocks(performance.now());
  bumpActivity();
});

installPanel(params);
</script>
</body>
</html>
