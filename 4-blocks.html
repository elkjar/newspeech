<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">blocks · params · [0] toggle</div>
  <label>
    <span class="name">grid cols</span><span class="val"></span>
    <input type="range" min="2" max="16" step="1" data-k="cols">
  </label>
  <label>
    <span class="name">grid rows</span><span class="val"></span>
    <input type="range" min="2" max="12" step="1" data-k="rows">
  </label>
  <label>
    <span class="name">invert chance</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="invertChance">
  </label>
  <label>
    <span class="name">reroll (ms)</span><span class="val"></span>
    <input type="range" min="80" max="3000" step="10" data-k="rerollMs">
  </label>
  <label>
    <span class="name">texture rebuild rate</span><span class="val"></span>
    <input type="range" min="0" max="2" step="0.01" data-k="textureRate">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, bumpActivity, installPanel, installTelemetry, tickTelemetry, installMarkers, tickMarkers } = Newspeech;
installInputs();

const params = {
  cols: 7,
  rows: 5,
  invertChance: 0.18,
  rerollMs: 600,
  textureRate: 0.18,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
const tex = document.createElement("canvas");
const tctx = tex.getContext("2d");

let viewW, viewH, dpr;

function buildTexture() {
  const w = viewW;
  const h = viewH * 2;
  tex.width = w;
  tex.height = h;

  tctx.fillStyle = "#050505";
  tctx.fillRect(0, 0, w, h);

  const numStreaks = Math.floor(h * 2.5);
  for (let i = 0; i < numStreaks; i++) {
    const y = (Math.random() * h) | 0;
    const xStart = Math.random() * w;
    const xLen = 30 + Math.random() * (w * 0.7);
    const a = Math.pow(Math.random(), 4) * 0.5 + 0.006;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(xStart, y, xLen, 1);
  }

  for (let i = 0; i < 5; i++) {
    const y = (Math.random() * h) | 0;
    const a = 0.25 + Math.random() * 0.45;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(0, y, w, 1 + ((Math.random() * 2) | 0));
  }
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildTexture();
}
window.addEventListener("resize", resize);
resize();

poisson(() => params.textureRate + 0.35 * intensity(), () => buildTexture());

// ---- block tiles ----
let blockTiles = null;
let blockRerollAt = 0;
function rerollBlocks(t) {
  blockTiles = [];
  const cols = Math.max(1, Math.round(params.cols));
  const rows = Math.max(1, Math.round(params.rows));
  const baseW = viewW / cols;
  const baseH = viewH / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = Math.random();
      let sw = baseW, sh = baseH;
      if (d < 0.25) sh = baseH * (0.25 + Math.random() * 0.4);
      else if (d < 0.5) sw = baseW * (0.25 + Math.random() * 0.4);
      blockTiles.push({
        dx: c * baseW,
        dy: r * baseH,
        dw: baseW,
        dh: baseH,
        sx: Math.random() * Math.max(1, tex.width - sw),
        sy: Math.random() * Math.max(1, tex.height - sh),
        sw, sh,
        inverted: Math.random() < params.invertChance,
      });
    }
  }
  blockRerollAt = t + params.rerollMs * 0.45 + Math.random() * params.rerollMs * 1.1;
}
function drawBlocks(t, dt) {
  if (!tex.width) return;
  if (!blockTiles || t > blockRerollAt) rerollBlocks(t);
  ctx.clearRect(0, 0, viewW, viewH);
  for (const tile of blockTiles) {
    ctx.drawImage(
      tex,
      tile.sx, tile.sy, tile.sw, tile.sh,
      tile.dx, tile.dy, tile.dw, tile.dh
    );
  }
  ctx.save();
  ctx.globalCompositeOperation = "difference";
  ctx.fillStyle = "#ffffff";
  for (const tile of blockTiles) {
    if (tile.inverted) ctx.fillRect(tile.dx, tile.dy, tile.dw, tile.dh);
  }
  ctx.restore();
}

let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawBlocks(t, dt);
  tickMarkers(dt);
  tickTelemetry(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  buildTexture();
  rerollBlocks(performance.now());
  bumpActivity();
});

installMarkers({ params });
installTelemetry({ params });
installPanel(params);
</script>
</body>
</html>
