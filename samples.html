<body>
  <header>
    <span class="label"><a href="index.html">newspeech</a> / samples</span>
    <span class="aux">
      <span id="count">loading…</span>
      <span class="sep">·</span>
      <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener noreferrer">cc by-sa 4.0</a>
    </span>
  </header>

  <div id="tree"></div>

<script>
// =========================================================================
// SAMPLE SOURCE
// hardcoded category → pack map. each pack's kit.seqkit (already on disk
// under sequencer/public/samples/<cat>/<pack>/) provides the file list. fetched
// at page load, decoded lazily on expand.
// =========================================================================
const PACK_CATEGORIES = {
  drums: [
    "Alesis_HR16A", "blck_noir", "Casio_MA-101", "linndrum", "ns-kit-1",
    "Roland CR-78", "Roland TR-808", "Roland TR-909", "Roland_CR-80", "sludge",
  ],
  bass: [
    "heat-death", "mini-moog", "peavish", "pro-bass", "saw", "shitsaw", "triangle",
  ],
  instruments: [
    "broken", "dark-omen", "dreams", "dx7-bells", "dx7-forest-house",
    "ethereal-piano", "grand-piano-ss", "grind", "haunted", "hydrasynth_plaits",
    "invasion", "plaits-soft-rev", "plucks", "poly6",
    "rhodes_mk1", "root_grain", "soft_piano", "tape_piano", "under_piano",
    "wave-grid", "wave-sub",
  ],
  pads: [
    "distant-pad-databent", "dx7-glaswerks", "encounter", "monolith",
    "monolith-databent", "nasa-databent", "pad-high-databent", "pulsed",
    "sinewaves-at-the-scope",
  ],
};
// production path (under _site/) — same string works locally if a static
// server is run from the project root after `bash build.sh`.
const SAMPLE_BASE = "sequencer/samples";

// flat lookup by path: "drums/blck_noir/kick/KICK-1.wav" → leaf node
const NODE_BY_PATH = new Map();
function indexNodes(nodes, parentPath) {
  for (const n of nodes) {
    const path = parentPath ? `${parentPath}/${n.name}` : n.name;
    NODE_BY_PATH.set(path, n);
    if (n.children) indexNodes(n.children, path);
  }
}

function countFiles(node) {
  if (!node.children) return 1;
  return node.children.reduce((s, c) => s + countFiles(c), 0);
}

// =========================================================================
// manifest → tree adapter
// drum packs have voices: { id: { files: [...] } } (flat file lists per voice)
// pitched packs have voices: { id: { roots: [{ midi, files: [...] }, ...] } }
// =========================================================================
function packToNode(packName, manifest, baseUrl) {
  const voices = manifest.voices ?? {};
  const isDrumPack = Object.values(voices).some((v) => Array.isArray(v.files));
  if (isDrumPack) {
    // voice subfolders: voiceId/<file>
    const children = Object.entries(voices).map(([voiceId, voice]) => {
      const files = (voice.files ?? []).map((rel) => fileLeaf(rel, baseUrl));
      return { name: voiceId, children: files };
    });
    return { name: packName, children };
  }
  // pitched: flatten all roots, sort by MIDI ascending
  const leaves = [];
  for (const voice of Object.values(voices)) {
    for (const root of voice.roots ?? []) {
      for (const rel of root.files ?? []) {
        leaves.push({ ...fileLeaf(rel, baseUrl), midi: root.midi });
      }
    }
  }
  leaves.sort((a, b) => (a.midi ?? 0) - (b.midi ?? 0));
  return { name: packName, children: leaves };
}

function fileLeaf(relativePath, baseUrl) {
  // file name = last segment of the relative path; URL is base + rel
  const name = relativePath.split("/").pop();
  return { name, url: `${baseUrl}/${relativePath}` };
}

async function buildManifest() {
  const tree = [];
  for (const [cat, packs] of Object.entries(PACK_CATEGORIES)) {
    const catNode = { name: cat, children: [] };
    for (const pack of packs) {
      const baseUrl = `${SAMPLE_BASE}/${cat}/${pack}`;
      try {
        const m = await fetch(`${baseUrl}/kit.seqkit`).then((r) => {
          if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
          return r.json();
        });
        catNode.children.push(packToNode(pack, m, baseUrl));
      } catch (err) {
        console.warn(`samples: failed to load ${cat}/${pack}/kit.seqkit`, err);
      }
    }
    tree.push(catNode);
  }
  return tree;
}

// =========================================================================
// helpers
// =========================================================================
function fmtTime(sec) {
  if (!isFinite(sec)) return "--:--";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function fmtSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

// =========================================================================
// render the tree
// =========================================================================
const tree = document.getElementById("tree");

function buildPrefix(parentLast, isLast) {
  // parentLast: array of booleans for ancestor "is last child" (deepest last)
  // isLast: this node is the last child of its parent
  let s = "";
  for (let i = 0; i < parentLast.length; i++) {
    s += parentLast[i] ? "    " : "│   ";
  }
  s += isLast ? "└── " : "├── ";
  return s;
}

function continuationPrefix(parentLast, isLast) {
  // prefix for content INSIDE an expanded file row's preview.
  // mirrors buildPrefix but uses spaces in the file-position column.
  let s = "";
  for (let i = 0; i < parentLast.length; i++) {
    s += parentLast[i] ? "    " : "│   ";
  }
  s += isLast ? "    " : "│   ";
  return s;
}

// recursive render — walks the tree at arbitrary depth
function renderNode(node, parentLast, isLast, parentPath) {
  const path = parentPath ? `${parentPath}/${node.name}` : node.name;
  const prefix = buildPrefix(parentLast, isLast);

  // everything except top-level rows starts hidden (default = all collapsed)
  const startHidden = parentLast.length > 0;

  if (node.children) {
    // directory row — defaults to collapsed
    const dir = document.createElement("div");
    dir.className = "row dir";
    dir.dataset.collapsed = "1";
    dir.dataset.path = path;
    dir.dataset.depth = String(parentLast.length);
    if (startHidden) dir.style.display = "none";
    const fileCount = countFiles(node);
    // pack-level rows (depth 1: cat/pack) get a "↓ zip" action on the right.
    // category-level (depth 0) and voice-level (depth 2) rows don't.
    const isPackLevel = parentLast.length === 1;
    const packDl = isPackLevel
      ? `<span class="pack-dl" role="button" tabindex="0" data-pack-path="${path}" data-pack-name="${node.name}">↓ zip</span>`
      : "";
    dir.innerHTML =
      `<span class="prefix">${prefix}<span class="marker">▸</span> </span>` +
      `<span class="name" data-count="${fileCount} ${fileCount === 1 ? 'file' : 'files'}">${node.name}/</span>` +
      packDl;
    tree.appendChild(dir);

    // recurse into children
    node.children.forEach((child, i) => {
      const childIsLast = i === node.children.length - 1;
      renderNode(child, [...parentLast, isLast], childIsLast, path);
    });
  } else {
    // file row — metadata loaded lazily on expand
    const row = document.createElement("div");
    row.className = "row file";
    row.dataset.path = path;
    row.dataset.depth = String(parentLast.length);
    if (startHidden) row.style.display = "none";
    row.innerHTML =
      `<span class="prefix">${prefix}</span>` +
      `<span class="name">${node.name}</span>` +
      `<span class="meta">` +
        `<span class="dur pending">--:--</span>` +
        `<span class="sz pending">— KB</span>` +
      `</span>`;
    tree.appendChild(row);

    // preview block (sibling of row, hidden until row.expanded)
    const prev = document.createElement("div");
    prev.className = "preview";
    prev.dataset.path = path;
    prev.style.paddingLeft = `calc(6px + ${prefix.length}ch)`;
    if (startHidden) prev.style.display = "none";
    prev.innerHTML = `
      <canvas class="wave" width="1200" height="144"></canvas>
      <div class="controls">
        <button type="button" class="play-btn" aria-label="play">▶ play</button>
        <span class="time">00:00 / --:--</span>
        <a class="dl" href="${node.url}" download>↓ download · wav</a>
      </div>
      <div class="license">creative commons · attribution-sharealike 4.0</div>
    `;
    tree.appendChild(prev);
  }
}

let MANIFEST = [];
async function init() {
  MANIFEST = await buildManifest();
  indexNodes(MANIFEST, "");
  MANIFEST.forEach((node, i) => {
    renderNode(node, [], i === MANIFEST.length - 1, "");
  });
  const totalCount = MANIFEST.reduce((s, n) => s + countFiles(n), 0);
  document.getElementById("count").textContent = `${totalCount} files`;
}
init();

// =========================================================================
// directory collapse/expand — path-prefix-based, supports arbitrary depth
// =========================================================================
function isDescendantPath(childPath, ancestorPath) {
  return childPath.startsWith(ancestorPath + "/");
}

function setDirCollapsed(dirRow, collapsed) {
  const path = dirRow.dataset.path;
  dirRow.dataset.collapsed = collapsed ? "1" : "0";
  dirRow.querySelector(".marker").textContent = collapsed ? "▸" : "▾";

  // direct vs transitive: when expanding, only un-hide DIRECT children (a
  // descendant whose own ancestor dir is collapsed must stay hidden).
  for (const el of tree.querySelectorAll("[data-path]")) {
    const p = el.dataset.path;
    if (!isDescendantPath(p, path)) continue;
    if (collapsed) {
      el.style.display = "none";
    } else {
      // visible iff every ancestor dir on its path (up to but not including this one) is open
      let visible = true;
      const segs = p.split("/");
      // build all ancestor paths between dirRow's path and the element
      for (let i = path.split("/").length; i < segs.length; i++) {
        const ancestor = segs.slice(0, i).join("/");
        const ancestorRow = tree.querySelector(`.row.dir[data-path="${ancestor}"]`);
        if (ancestorRow && ancestorRow.dataset.collapsed === "1") { visible = false; break; }
      }
      el.style.display = visible ? "" : "none";
    }
  }

  // when collapsing, also reset any expanded file row inside this dir
  if (collapsed) {
    for (const r of tree.querySelectorAll(".row.file.expanded")) {
      if (isDescendantPath(r.dataset.path, path)) collapseFile(r);
    }
  }
}

// =========================================================================
// file expand/collapse + waveform render + playhead animation
// =========================================================================
function getPreview(row) {
  return row.nextElementSibling; // the .preview block sits directly after the row
}

function renderWaveform(canvas, peaks, progress, dpr) {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const cy = h / 2;
  const barW = 2;
  const gap = 1;
  const stride = barW + gap;
  const count = Math.max(20, Math.floor(w / stride));
  // resample peaks to bar count
  const playedX = w * progress;
  for (let i = 0; i < count; i++) {
    const t = i / (count - 1);
    const idx = Math.min(peaks.length - 1, Math.floor(t * peaks.length));
    const v = peaks[idx];
    const half = Math.max(1, v * (h * 0.46));
    const x = i * stride;
    const played = x < playedX;
    ctx.fillStyle = played ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.42)";
    ctx.fillRect(x, cy - half, barW, half * 2);
  }
  // playhead line
  if (progress > 0 && progress < 1) {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillRect(Math.min(w - 1, playedX), 0, 1, h);
  }
}

const players = new Map(); // row -> playback state
const audioCache = new Map(); // url -> { buffer, peaks, sizeBytes }
let sharedCtx = null;
let activeSource = null;

function ensureCtx() {
  if (!sharedCtx) sharedCtx = new (window.AudioContext || window.webkitAudioContext)();
  // resumes on first user interaction (autoplay policy)
  if (sharedCtx.state === "suspended") sharedCtx.resume();
  return sharedCtx;
}

function computePeaks(buffer, n) {
  const data = buffer.getChannelData(0);
  const step = Math.max(1, Math.floor(data.length / n));
  const peaks = new Array(n);
  for (let i = 0; i < n; i++) {
    let max = 0;
    const start = i * step;
    const end = Math.min(data.length, start + step);
    for (let j = start; j < end; j++) {
      const v = Math.abs(data[j]);
      if (v > max) max = v;
    }
    peaks[i] = max;
  }
  // normalize so the tallest bar fills the canvas — quiet recordings still
  // render legibly.
  let peak = 0;
  for (const v of peaks) if (v > peak) peak = v;
  if (peak > 0) for (let i = 0; i < peaks.length; i++) peaks[i] = peaks[i] / peak;
  return peaks;
}

async function loadAudio(url) {
  if (audioCache.has(url)) return audioCache.get(url);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
  const bytes = await resp.arrayBuffer();
  const buffer = await ensureCtx().decodeAudioData(bytes.slice(0));
  const peaks = computePeaks(buffer, 240);
  const entry = { buffer, peaks, sizeBytes: bytes.byteLength };
  audioCache.set(url, entry);
  return entry;
}

function expandFile(row) {
  // collapse any other expanded file (single-expanded rule)
  for (const r of tree.querySelectorAll(".row.file.expanded")) {
    if (r !== row) collapseFile(r);
  }
  row.classList.add("expanded");

  const path = row.dataset.path;
  const entry = NODE_BY_PATH.get(path);
  const prev = getPreview(row);
  const canvas = prev.querySelector("canvas.wave");
  const btn = prev.querySelector(".play-btn");
  const timeEl = prev.querySelector(".time");
  const durEl = row.querySelector(".dur");
  const szEl = row.querySelector(".sz");

  const dpr = Math.max(1, window.devicePixelRatio || 1);
  // render a flat resting line as a "loading" placeholder until decode lands
  requestAnimationFrame(() => renderWaveform(canvas, new Array(240).fill(0.03), 0, dpr));

  const state = {
    url: entry.url,
    duration: 0,
    buffer: null,
    peaks: null,
    offset: 0,
    paused: true,
    canvas, timeEl, btn, dpr,
    startedAtCtxTime: 0,
    startedAtOffset: 0,
    rafId: 0,
    source: null,
  };
  players.set(row, state);

  btn.disabled = true;

  loadAudio(entry.url).then(({ buffer, peaks, sizeBytes }) => {
    if (!players.has(row)) return; // collapsed before decode finished
    state.buffer = buffer;
    state.peaks = peaks;
    state.duration = buffer.duration;
    btn.disabled = false;
    durEl.textContent = fmtTime(buffer.duration);
    durEl.classList.remove("pending");
    szEl.textContent = fmtSize(sizeBytes);
    szEl.classList.remove("pending");
    timeEl.textContent = `00:00 / ${fmtTime(buffer.duration)}`;
    renderWaveform(canvas, peaks, 0, dpr);
  }).catch((err) => {
    console.warn(`samples: decode failed for ${entry.url}`, err);
    durEl.textContent = "error";
    szEl.textContent = "error";
  });

  canvas.onclick = (e) => {
    if (!state.buffer) return;
    const rect = canvas.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    state.offset = p * state.duration;
    if (!state.paused) {
      stopSource(state);
      startPlayback(state);
    } else {
      renderWaveform(state.canvas, state.peaks, p, state.dpr);
      state.timeEl.textContent = `${fmtTime(state.offset)} / ${fmtTime(state.duration)}`;
    }
  };

  btn.onclick = () => {
    if (!state.buffer) return;
    if (state.paused) startPlayback(state);
    else pausePlayback(state);
  };
}

function collapseFile(row) {
  row.classList.remove("expanded");
  const state = players.get(row);
  if (state) {
    cancelAnimationFrame(state.rafId);
    if (state.source) stopSource(state);
    players.delete(row);
  }
}

function stopSource(state) {
  if (!state.source) return;
  try { state.source.onended = null; state.source.stop(); } catch {}
  state.source.disconnect();
  if (activeSource === state.source) activeSource = null;
  state.source = null;
}

function startPlayback(state) {
  // stop any other row's playback (single-source rule)
  if (activeSource) {
    for (const s of players.values()) {
      if (s.source === activeSource) { stopSource(s); s.paused = true; s.btn.textContent = "▶ play"; cancelAnimationFrame(s.rafId); }
    }
  }
  const ctx = ensureCtx();
  const src = ctx.createBufferSource();
  src.buffer = state.buffer;
  src.connect(ctx.destination);
  src.start(0, state.offset);
  state.source = src;
  activeSource = src;
  state.startedAtCtxTime = ctx.currentTime;
  state.startedAtOffset = state.offset;
  state.paused = false;
  state.btn.textContent = "■ pause";
  src.onended = () => {
    // only fire end-reset if it's still our active source (user didn't pause)
    if (src !== state.source) return;
    state.offset = 0;
    state.paused = true;
    state.btn.textContent = "▶ play";
    state.source = null;
    if (activeSource === src) activeSource = null;
    cancelAnimationFrame(state.rafId);
    renderWaveform(state.canvas, state.peaks, 0, state.dpr);
    state.timeEl.textContent = `00:00 / ${fmtTime(state.duration)}`;
  };
  drawAndTick(state);
}

function pausePlayback(state) {
  if (state.paused) return;
  const ctx = ensureCtx();
  state.offset = state.startedAtOffset + (ctx.currentTime - state.startedAtCtxTime);
  if (state.offset >= state.duration) state.offset = 0;
  stopSource(state);
  state.paused = true;
  state.btn.textContent = "▶ play";
  cancelAnimationFrame(state.rafId);
  const progress = Math.min(1, state.offset / state.duration);
  renderWaveform(state.canvas, state.peaks, progress, state.dpr);
  state.timeEl.textContent = `${fmtTime(state.offset)} / ${fmtTime(state.duration)}`;
}

function drawAndTick(state) {
  cancelAnimationFrame(state.rafId);
  const ctx = ensureCtx();
  function tick() {
    if (state.paused) return;
    const elapsed = state.startedAtOffset + (ctx.currentTime - state.startedAtCtxTime);
    const progress = Math.min(1, elapsed / state.duration);
    renderWaveform(state.canvas, state.peaks, progress, state.dpr);
    state.timeEl.textContent = `${fmtTime(Math.min(elapsed, state.duration))} / ${fmtTime(state.duration)}`;
    state.rafId = requestAnimationFrame(tick);
  }
  state.rafId = requestAnimationFrame(tick);
}

// =========================================================================
// pack-level zip download — client-side via JSZip. fetches every leaf under
// the pack's subtree + its kit.seqkit, zips them with paths relative to
// the pack root, and saves as newspeech-<pack>.zip. blocked while in flight
// to prevent duplicate fires.
// =========================================================================
function collectPackLeaves(packNode) {
  const leaves = [];
  function walk(n) {
    if (n.children) n.children.forEach(walk);
    else if (n.url) leaves.push(n);
  }
  walk(packNode);
  return leaves;
}

async function zipPack(btn, packPath, packName) {
  if (typeof window.JSZip !== "function") {
    console.warn("zipPack: JSZip not loaded");
    return;
  }
  if (btn.getAttribute("aria-busy") === "true") return;
  const packNode = NODE_BY_PATH.get(packPath);
  if (!packNode) return;
  const leaves = collectPackLeaves(packNode);
  if (!leaves.length) return;

  // baseUrl is the URL prefix shared by every leaf in this pack; strip it
  // to get the relative path inside the zip.
  const baseUrl = `${SAMPLE_BASE}/${packPath}`;
  const origLabel = btn.textContent;
  btn.setAttribute("aria-busy", "true");
  btn.textContent = `0 / ${leaves.length}`;

  const zip = new window.JSZip();
  let done = 0;
  let failed = 0;

  // pull kit.seqkit too so the zip is a self-contained pack
  try {
    const m = await fetch(`${baseUrl}/kit.seqkit`);
    if (m.ok) zip.file("kit.seqkit", await m.arrayBuffer());
  } catch (err) {
    console.warn(`zipPack: kit.seqkit fetch failed for ${packPath}`, err);
  }

  // serial fetches keep the progress label readable + avoid hammering a single
  // origin. these are static assets so parallelism wouldn't speed them up much.
  for (const leaf of leaves) {
    try {
      const r = await fetch(leaf.url);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const buf = await r.arrayBuffer();
      const rel = leaf.url.startsWith(baseUrl + "/")
        ? leaf.url.slice(baseUrl.length + 1)
        : leaf.url.split("/").pop();
      zip.file(rel, buf);
    } catch (err) {
      console.warn(`zipPack: failed to fetch ${leaf.url}`, err);
      failed++;
    }
    done++;
    btn.textContent = `${done} / ${leaves.length}`;
  }

  btn.textContent = "zipping…";
  try {
    const blob = await zip.generateAsync({ type: "blob", compression: "STORE" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `newspeech-${packName}.zip`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    console.warn(`zipPack: zip generation failed for ${packPath}`, err);
  }

  btn.removeAttribute("aria-busy");
  btn.textContent = failed ? `↓ zip (${failed} missing)` : origLabel;
}

// =========================================================================
// click delegation
// =========================================================================
tree.addEventListener("click", (e) => {
  const dl = e.target.closest(".pack-dl");
  if (dl) {
    e.stopPropagation();
    zipPack(dl, dl.dataset.packPath, dl.dataset.packName);
    return;
  }
  const row = e.target.closest(".row");
  if (!row) return;
  if (row.classList.contains("dir")) {
    setDirCollapsed(row, row.dataset.collapsed !== "1" ? true : false);
  } else if (row.classList.contains("file")) {
    if (row.classList.contains("expanded")) collapseFile(row);
    else expandFile(row);
  }
});

// re-render any expanded waveforms on resize (canvas width changed)
window.addEventListener("resize", () => {
  for (const [row, state] of players) {
    if (!state.peaks || !state.duration) continue;
    const ctx = sharedCtx;
    const elapsed = state.paused || !ctx
      ? state.offset
      : state.startedAtOffset + (ctx.currentTime - state.startedAtCtxTime);
    const progress = Math.min(1, elapsed / state.duration);
    renderWaveform(state.canvas, state.peaks, progress, state.dpr);
  }
});
</script>
</body>
