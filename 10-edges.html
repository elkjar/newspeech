<!doctype html>
<html lang="en">
<head>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid;
    gap: 6px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  #panel .panel-source .src-name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    opacity: 0.55;
  }
  #panel .panel-source .src-status {
    font-size: 10px;
    letter-spacing: 0.04em;
    opacity: 0.45;
    font-variant-numeric: tabular-nums;
  }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.75);
    width: 100%;
  }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 4px 8px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.04em;
    cursor: pointer;
    margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover {
    background: rgba(255, 255, 255, 0.16);
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">edges · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">particle count</span><span class="val"></span>
    <input type="range" min="0.1" max="6" step="0.05" data-k="particleMul">
  </label>
  <label>
    <span class="name">speed multiplier</span><span class="val"></span>
    <input type="range" min="0.1" max="8" step="0.05" data-k="speedMul">
  </label>
  <label>
    <span class="name">directions</span><span class="val"></span>
    <input type="range" min="4" max="64" step="1" data-k="directions">
  </label>
  <label>
    <span class="name">edge weight</span><span class="val"></span>
    <input type="range" min="0" max="4" step="0.05" data-k="edgeWeight">
  </label>
  <label>
    <span class="name">audio dissolve</span><span class="val"></span>
    <input type="range" min="0" max="1.5" step="0.01" data-k="dissolve">
  </label>
  <label>
    <span class="name">overlay opacity</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="overlay">
  </label>
  <label>
    <span class="name">overlay invert</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="invert">
  </label>
  <label>
    <span class="name">trail fade</span><span class="val"></span>
    <input type="range" min="0.1" max="8" step="0.05" data-k="fadeMul">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, installInputs, tickInputs, bumpActivity, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry } = Newspeech;
installInputs({ moveSensitivity: 0.003, decay: 1.0, intensityMouseWeight: 0.3 });

const params = {
  particleMul: 1,
  speedMul: 1,
  directions: 16,
  edgeWeight: 2.5,
  dissolve: 1,
  overlay: 0,
  invert: 0,
  fadeMul: 1,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
// trails draw onto a separate offscreen canvas so the source-image overlay
// can sit cleanly underneath without being chewed up by trail-fade compositing.
const trailsCanvas = document.createElement("canvas");
const trailsCtx = trailsCanvas.getContext("2d");

let viewW, viewH, dpr;
let cw, ch;
let particles = [];
let currentImg = null; // last-loaded image element (for overlay rendering)

// ---- edge field (built from source image) ----
let edgeMag = null;       // Float32Array — normalized 0..1
let edgeTan = null;       // Float32Array — tangent angle, radians
let sw = 0, sh = 0;       // sobel grid dimensions
let imgW = 0, imgH = 0;   // source image dimensions
const SOBEL_LONG_EDGE = 480;

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

// ---- video source state (when active, frame loop recomputes Sobel each tick) ----
let videoEl = null;
let videoUrl = null;

// ---- shared buffers for the Sobel pass — reused across frames for video ----
let _offCanvas = null;
let _offCtx = null;
let _grayBuf = null;
let _magBuf = null;
let _tanBuf = null;

function ensureSobelBuffers() {
  if (!_offCanvas || _offCanvas.width !== sw || _offCanvas.height !== sh) {
    _offCanvas = document.createElement("canvas");
    _offCanvas.width = sw;
    _offCanvas.height = sh;
    _offCtx = _offCanvas.getContext("2d", { willReadFrequently: true });
  }
  const n = sw * sh;
  if (!_grayBuf || _grayBuf.length !== n) {
    _grayBuf = new Float32Array(n);
    _magBuf  = new Float32Array(n);
    _tanBuf  = new Float32Array(n);
  }
}

// computes edge magnitude + tangent for the current source element (image or
// video frame) into _magBuf/_tanBuf, then publishes them to edgeMag/edgeTan.
function computeSobel(srcEl) {
  ensureSobelBuffers();
  _offCtx.drawImage(srcEl, 0, 0, sw, sh);
  const { data } = _offCtx.getImageData(0, 0, sw, sh);
  const g = _grayBuf;
  for (let i = 0, j = 0; i < g.length; i++, j += 4) {
    g[i] = (data[j] * 0.299 + data[j + 1] * 0.587 + data[j + 2] * 0.114) / 255;
  }
  const mag = _magBuf;
  const tan = _tanBuf;
  let maxMag = 1e-6;
  for (let y = 1; y < sh - 1; y++) {
    for (let x = 1; x < sw - 1; x++) {
      const i = y * sw + x;
      const a = g[i - sw - 1], b = g[i - sw], c = g[i - sw + 1];
      const d = g[i - 1],                 f = g[i + 1];
      const e = g[i + sw - 1], h = g[i + sw], k = g[i + sw + 1];
      const gx = -a + c - 2 * d + 2 * f - e + k;
      const gy = -a - 2 * b - c + e + 2 * h + k;
      const m = Math.hypot(gx, gy);
      mag[i] = m;
      // tangent perpendicular to gradient: rotate (gx,gy) by 90° → (-gy, gx)
      tan[i] = Math.atan2(gx, -gy);
      if (m > maxMag) maxMag = m;
    }
  }
  // normalize against the 95th-percentile rather than absolute max — a
  // single high-contrast region otherwise pegs the max and crushes every
  // other edge into near-zero.
  const sample = [];
  for (let i = 0; i < mag.length; i += 5) if (mag[i] > 0) sample.push(mag[i]);
  sample.sort((a, b) => a - b);
  const norm = sample.length ? sample[Math.floor(sample.length * 0.95)] : maxMag;
  const inv = 1 / Math.max(1e-6, norm);
  for (let i = 0; i < mag.length; i++) {
    const v = mag[i] * inv;
    mag[i] = v > 1 ? 1 : v;
  }
  edgeMag = mag;
  edgeTan = tan;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(srcOrFile) {
  let url = null;
  let revoke = false;
  try {
    if (typeof srcOrFile === "string") {
      url = srcOrFile;
    } else {
      url = URL.createObjectURL(srcOrFile);
      revoke = true;
    }
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    const scale = SOBEL_LONG_EDGE / Math.max(imgW, imgH);
    sw = Math.max(2, Math.floor(imgW * scale));
    sh = Math.max(2, Math.floor(imgH * scale));
    computeSobel(img);
    currentImg = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("source image load failed:", err);
    setStatus("load failed", true);
    edgeMag = null;
    edgeTan = null;
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;       // required for autoplay; the visualizer uses the mic for audio
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      const scale = SOBEL_LONG_EDGE / Math.max(imgW, imgH);
      sw = Math.max(2, Math.floor(imgW * scale));
      sh = Math.max(2, Math.floor(imgH * scale));
      ensureSobelBuffers();
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(srcOrFile) {
  setStatus("loading…");
  stopVideo();
  const isVideoFile = srcOrFile && typeof srcOrFile !== "string"
    && srcOrFile.type && srcOrFile.type.startsWith("video/");
  if (isVideoFile) return loadVideoSource(srcOrFile);
  return loadImageSource(srcOrFile);
}

// device-px (x, y) → edge sample, with cover-fit mapping (image fills canvas, overflow cropped)
function sampleEdge(x, y) {
  if (!edgeMag) return null;
  const scale = Math.max(cw / imgW, ch / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  const offX = (cw - drawW) * 0.5;
  const offY = (ch - drawH) * 0.5;
  const ix = (x - offX) / scale;
  const iy = (y - offY) / scale;
  let sx = Math.floor(ix * sw / imgW);
  let sy = Math.floor(iy * sh / imgH);
  if (sx < 0) sx = 0; else if (sx >= sw) sx = sw - 1;
  if (sy < 0) sy = 0; else if (sy >= sh) sy = sh - 1;
  const i = sy * sw + sx;
  return { m: edgeMag[i], t: edgeTan[i] };
}

function quantize(ang) {
  const dirs = Math.max(1, Math.round(params.directions));
  const step = (Math.PI * 2) / dirs;
  return Math.round(ang / step) * step;
}

// rejection-sample a spawn position weighted by edge magnitude — concentrates
// particle density on contours so the source is legible from instantaneous
// distribution alone (critical for video, where trails can't accumulate).
// audio dissolve also scales the bias back to uniform.
function sampleSpawnPosition() {
  if (!edgeMag) return [Math.random() * cw, Math.random() * ch];
  const env = intensity();
  const dissolveK = Math.max(0, 1 - env * params.dissolve);
  if (dissolveK <= 0) return [Math.random() * cw, Math.random() * ch];
  for (let attempts = 0; attempts < 12; attempts++) {
    const cx = Math.random() * cw;
    const cy = Math.random() * ch;
    const e = sampleEdge(cx, cy);
    if (e && Math.random() < e.m * dissolveK) return [cx, cy];
  }
  return [Math.random() * cw, Math.random() * ch];
}

function makeParticle(x, y) {
  let px, py;
  if (x !== undefined && y !== undefined) {
    px = x; py = y;
  } else {
    [px, py] = sampleSpawnPosition();
  }
  return {
    x: px,
    y: py,
    dir: Math.random() * Math.PI * 2,
    distSinceTurn: 1e9,
    nextTurn: 6 + Math.random() * 24,
    age: 0,
    life: 0.8 + Math.random() * 2.6,
    bright: Math.random() < 0.05,
  };
}

function targetParticleCount() {
  const base = Math.min(9000, Math.max(1500, Math.floor(cw * ch / 900)));
  return Math.max(1, Math.round(base * params.particleMul));
}
function adjustParticleCount() {
  const target = targetParticleCount();
  while (particles.length < target) particles.push(makeParticle());
  if (particles.length > target) particles.length = target;
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);
  trailsCanvas.width = cw;
  trailsCanvas.height = ch;
  trailsCtx.imageSmoothingEnabled = false;
  // trails canvas stays transparent — fading uses destination-out so the
  // overlay underneath shows through wherever particles haven't drawn.
  adjustParticleCount();
}
window.addEventListener("resize", resize);

// ---- field: probabilistic commit between sin wander and edge tangent ----
// each re-sample either fully follows the local tangent (probability w) or
// fully wanders (1-w). The tangent's 180° ambiguity is resolved against the
// particle's *current direction* — anchoring to wander instead caused 180°
// flips between re-samples (since wander changes fast), so particles
// oscillated in place on edges instead of riding along them.
function field(x, y, t, prevDir) {
  const u = x / cw;
  const v = y / ch;
  const a = Math.sin(u * 6.0 + t * 0.00031);
  const b = Math.sin(v * 5.0 - t * 0.00023);
  const c = Math.sin((u + v) * 4.0 + t * 0.00041);
  const d = Math.sin((u - v) * 7.0 - t * 0.00017);
  const wander = (a + b + 0.6 * c + 0.4 * d) * Math.PI;

  const e = sampleEdge(x, y);
  if (!e) return wander;

  const env = intensity();
  const dissolveK = Math.max(0, 1 - env * params.dissolve);
  const w = e.m * params.edgeWeight * dissolveK;
  if (w <= 0 || Math.random() > w) return wander;

  let ta = e.t;
  if (Math.cos(prevDir - ta) < 0) ta += Math.PI;
  return ta;
}

function drawOverlay(alpha) {
  let src = null;
  if (videoEl && videoEl.readyState >= 2) src = videoEl;
  else if (currentImg) src = currentImg;
  if (!src || imgW === 0 || imgH === 0) return;
  const scale = Math.max(cw / imgW, ch / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  const offX = (cw - drawW) * 0.5;
  const offY = (ch - drawH) * 0.5;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.filter = `invert(${params.invert})`;
  ctx.drawImage(src, offX, offY, drawW, drawH);
  ctx.restore();
}

function step(dt) {
  const t = performance.now();
  const env = intensity();
  const dissolveK = Math.max(0, 1 - env * params.dissolve);

  // fade trails by removing alpha (destination-out) instead of overwriting
  // with bg color — keeps the trails canvas transparent so the overlay
  // shows through where there aren't particles.
  const fadeAlpha = Math.min(0.4, (1.6 + 2.4 * (1 - env)) * dt * params.fadeMul);
  trailsCtx.globalCompositeOperation = "destination-out";
  trailsCtx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
  trailsCtx.fillRect(0, 0, cw, ch);
  trailsCtx.globalCompositeOperation = "source-over";

  const speedCss = (90 + 180 * env) * params.speedMul;
  const speed = speedCss * dpr;

  for (const p of particles) {
    if (p.distSinceTurn >= p.nextTurn) {
      p.dir = quantize(field(p.x, p.y, t, p.dir));
      p.distSinceTurn = 0;
      p.nextTurn = 6 + Math.random() * 24;
    }
    const dx = Math.cos(p.dir) * speed * dt;
    const dy = Math.sin(p.dir) * speed * dt;
    p.x += dx;
    p.y += dy;
    p.distSinceTurn += Math.hypot(dx, dy);
    p.age += dt;

    if (p.x < 0) p.x += cw;
    else if (p.x >= cw) p.x -= cw;
    if (p.y < 0) p.y += ch;
    else if (p.y >= ch) p.y -= ch;

    if (p.age > p.life) {
      const [nx, ny] = sampleSpawnPosition();
      p.x = nx;
      p.y = ny;
      p.age = 0;
      p.life = 0.8 + Math.random() * 2.6;
      p.bright = Math.random() < 0.05;
      p.distSinceTurn = 1e9;
    }

    // alpha scales with local edge magnitude — particles on contours read
    // bright, off-contour particles dim toward a 15% floor. dissolveK lerps
    // back to uniform full visibility under audio.
    const eHere = sampleEdge(p.x, p.y);
    const m = eHere ? eHere.m : 0;
    const visScale = 1 - 0.85 * dissolveK * (1 - m);

    const xi = p.x | 0;
    const yi = p.y | 0;
    if (p.bright) {
      const a = 0.95 * visScale;
      trailsCtx.fillStyle = `rgba(255, 255, 255, ${a.toFixed(3)})`;
      trailsCtx.fillRect(xi, yi, 1, 1);
    } else {
      const ageK = 1 - Math.min(1, p.age / p.life);
      const a = (0.45 + 0.35 * ageK) * visScale;
      trailsCtx.fillStyle = `rgba(220, 220, 220, ${a.toFixed(3)})`;
      trailsCtx.fillRect(xi, yi, 1, 1);
    }
  }

  // composite to main canvas: bg → optional source overlay → trails layer
  ctx.clearRect(0, 0, cw, ch);
  if (params.overlay > 0) drawOverlay(params.overlay);
  ctx.drawImage(trailsCanvas, 0, 0);
  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  // when a video source is active, recompute the edge field from the current
  // frame so particles track moving contours.
  // recompute on every ready frame (incl. paused+seeked for the offline render)
  if (videoEl && videoEl.readyState >= 2) {
    computeSobel(videoEl);
  }
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  const cx = e.clientX * dpr;
  const cy = e.clientY * dpr;
  const burst = 200;
  const radius = 40 * dpr;
  for (let i = 0; i < burst; i++) {
    const r = Math.pow(Math.random(), 0.5) * radius;
    const a = Math.random() * Math.PI * 2;
    const idx = (Math.random() * particles.length) | 0;
    particles[idx] = makeParticle(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    if (Math.random() < 0.15) particles[idx].bright = true;
  }
  bumpActivity();
});

window.onParamChange = (k) => {
  if (k === "particleMul") adjustParticleCount();
};

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : currentImg,
  getSourceDims: () => ({ w: imgW, h: imgH }),
  getEdgeData: () => edgeMag ? { mag: edgeMag, w: sw, h: sh } : null,
});

installTelemetry({ params });

installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  // resolve only once a decoded frame is actually available, so the offline
  // renderer never screenshots a blank pre-decode frame — notably the first
  // frame, where the target time already equals currentTime.
  const ready = () => {
    if (videoEl.readyState >= 2) return res();
    videoEl.addEventListener("loadeddata", () => res(), { once: true });
  };
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return ready();
  videoEl.addEventListener("seeked", ready, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", ready); ready(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});
</script>
</body>
</html>
