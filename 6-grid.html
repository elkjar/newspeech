<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">grid · params · [0] toggle</div>
  <label>
    <span class="name">snap rate</span><span class="val"></span>
    <input type="range" min="0" max="4" step="0.05" data-k="snapRate">
  </label>
  <label>
    <span class="name">invert flash rate</span><span class="val"></span>
    <input type="range" min="0" max="4" step="0.05" data-k="flashRate">
  </label>
  <label>
    <span class="name">moiré rotation</span><span class="val"></span>
    <input type="range" min="0" max="1.57" step="0.005" data-k="moireRot">
  </label>
  <label>
    <span class="name">zoom rate</span><span class="val"></span>
    <input type="range" min="-0.5" max="0.5" step="0.005" data-k="zoomRate">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, bumpActivity, installPanel, installTelemetry, tickTelemetry, installMarkers, tickMarkers } = Newspeech;
installInputs();

const params = {
  snapRate: 0.5,
  flashRate: 0.25,
  moireRot: 0.07,
  zoomRate: 0.08,
};

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let viewW, viewH, dpr;
function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width  = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width  = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---- grid ----
// 40x40 base grid + 41x41 rotated overlay composited via "difference" produces
// the moiré. exponential ambient zoom (1×→2× loop, configurable rate). vertices
// are noise-warped slightly. poisson-scheduled scroll snaps and full-frame
// invert flashes punctuate. ported from the live-hydra equivalent — see
// renderer-choice memory.
let flashUntil = 0;
let snapX = 0, snapY = 0, snapEnd = 0;

function gridNoiseAt(x, y, t) {
  return 0.5 * (
    Math.sin(x * 0.010 + t * 0.5) +
    Math.sin(y * 0.013 + t * 0.7) +
    Math.sin((x + y) * 0.007 + t * 0.3)
  );
}
function drawGridLines(N, segPerLine, t, useDifference) {
  const cellW = viewW / N;
  const cellH = viewH / N;
  if (useDifference) { ctx.save(); ctx.globalCompositeOperation = "difference"; }
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= N; i++) {
    const x = i * cellW;
    ctx.beginPath();
    for (let s = 0; s <= segPerLine; s++) {
      const y = (s / segPerLine) * viewH;
      const dx = gridNoiseAt(x, y, t) * 1.5;
      if (s === 0) ctx.moveTo(x + dx, y); else ctx.lineTo(x + dx, y);
    }
    ctx.stroke();
  }
  for (let j = 0; j <= N; j++) {
    const y = j * cellH;
    ctx.beginPath();
    for (let s = 0; s <= segPerLine; s++) {
      const x = (s / segPerLine) * viewW;
      const dy = gridNoiseAt(x + 100, y + 100, t) * 1.5;
      if (s === 0) ctx.moveTo(x, y + dy); else ctx.lineTo(x, y + dy);
    }
    ctx.stroke();
  }
  if (useDifference) ctx.restore();
}
function drawGrid(t) {
  if (t > snapEnd) { snapX = 0; snapY = 0; }

  ctx.clearRect(0, 0, viewW, viewH);

  const tSec = t / 1000;
  const zoom = Math.pow(2, (tSec * params.zoomRate) % 1) * (1 - intensity() * 0.15);
  // slow LFO twist — each grid oscillates ±0.08 rad (~4.6°) in opposite
  // directions, so the relative moiré angle breathes around params.moireRot
  // and drifts through interference sweet spots over ~31s.
  const twist = 0.08 * Math.sin(tSec / 5);

  ctx.save();
  ctx.translate(snapX + viewW / 2, snapY + viewH / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-viewW / 2, -viewH / 2);

  ctx.save();
  ctx.translate(viewW / 2, viewH / 2);
  ctx.rotate(-twist);
  ctx.translate(-viewW / 2, -viewH / 2);
  drawGridLines(40, 32, tSec, false);
  ctx.restore();

  ctx.save();
  ctx.translate(viewW / 2, viewH / 2);
  ctx.rotate(params.moireRot + twist);
  ctx.translate(-viewW / 2, -viewH / 2);
  drawGridLines(41, 32, tSec, true);
  ctx.restore();

  ctx.restore();

  if (t < flashUntil) {
    ctx.save();
    ctx.globalCompositeOperation = "difference";
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, viewW, viewH);
    ctx.restore();
  }
}

// ---- RAF loop ----
let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawGrid(t);
  tickMarkers(dt);
  tickTelemetry(dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- snaps & flashes ----
poisson(
  () => params.snapRate + 0.5 * intensity(),
  () => {
    snapX = (Math.random() - 0.5) * 0.3 * viewW;
    snapY = (Math.random() - 0.5) * 0.3 * viewH;
    snapEnd = performance.now() + 100;
  }
);
poisson(
  () => params.flashRate + 0.7 * intensity(),
  () => { flashUntil = performance.now() + 70; }
);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  bumpActivity();
});

installMarkers({ params });
installTelemetry({ params });
installPanel(params);
</script>
</body>
</html>
