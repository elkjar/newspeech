<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050505">
<title>NEWSPEECH // ascii</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio/video experimentation.">
<meta property="og:title" content="NEWSPEECH // ascii">
<meta property="og:description" content="newspeech — audio/video experimentation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.newspeechsound.com/15-ascii.html">
<meta property="og:site_name" content="NEWSPEECH">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="https://www.newspeechsound.com/og-image.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NEWSPEECH">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NEWSPEECH // ascii">
<meta name="twitter:description" content="newspeech — audio/video experimentation.">
<meta name="twitter:image" content="https://www.newspeechsound.com/og-image.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }

  #panel .panel-source {
    display: grid; gap: 6px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #panel .panel-source .src-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel .panel-source .src-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; opacity: 0.55; }
  #panel .panel-source .src-status { font-size: 10px; letter-spacing: 0.04em; opacity: 0.45; font-variant-numeric: tabular-nums; }
  #panel .panel-source .src-status.err { color: rgba(255, 180, 180, 0.95); opacity: 0.9; }
  #panel .panel-source input[type="file"] { font-size: 10px; color: rgba(255, 255, 255, 0.75); width: 100%; }
  #panel .panel-source input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.18); padding: 4px 8px;
    font-family: inherit; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; margin-right: 8px;
  }
  #panel .panel-source input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.16); }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel">
  <div class="panel-title">ascii · params · [0] toggle</div>
  <div class="panel-source">
    <div class="src-row">
      <span class="src-name">source</span>
      <span class="src-status" id="src-status">no source</span>
    </div>
    <input id="src-file" type="file" accept="image/*,video/*">
  </div>
  <label>
    <span class="name">cell size</span><span class="val"></span>
    <input type="range" min="6" max="32" step="1" data-k="cellSize">
  </label>
  <label>
    <span class="name">charset</span><span class="val"></span>
    <input type="range" min="0" max="2" step="1" data-k="charset">
  </label>
  <label>
    <span class="name">contrast</span><span class="val"></span>
    <input type="range" min="0.3" max="2.5" step="0.05" data-k="contrast">
  </label>
  <label>
    <span class="name">char scale</span><span class="val"></span>
    <input type="range" min="0.5" max="1.4" step="0.02" data-k="charScale">
  </label>
  <label>
    <span class="name">audio jitter</span><span class="val"></span>
    <input type="range" min="0" max="1" step="0.01" data-k="audioJitter">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, installInputs, tickInputs, installPanel, installMarkers, tickMarkers, installTelemetry, tickTelemetry } = Newspeech;
installInputs();

const params = {
  cellSize: 14,
  charset: 1,
  contrast: 1.2,
  charScale: 1.0,
  audioJitter: 0.6,
};

// charset 0: classic short ramp (dark→light)
// charset 1: scramble — per-cell glyph picked by hash, alpha tracks luminance
// charset 2: unicode blocks — chunky low-res look
const RAMPS = [
  " .:-=+*#%@",
  "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~",
  " ░▒▓█",
];

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let viewW, viewH, dpr, cw, ch;
let imgW = 0, imgH = 0;

let dsCanvas, dsCtx;
let dsW = 0, dsH = 0;
let lumBuf = null;

const statusEl = document.getElementById("src-status");
function setStatus(text, isErr) {
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

let videoEl = null;
let videoUrl = null;
let imgEl = null;

function ensureGridBuffers() {
  if (!dsCanvas) {
    dsCanvas = document.createElement("canvas");
    dsCtx = dsCanvas.getContext("2d", { willReadFrequently: true });
  }
  if (dsCanvas.width !== dsW || dsCanvas.height !== dsH) {
    dsCanvas.width = dsW;
    dsCanvas.height = dsH;
  }
  const n = dsW * dsH;
  if (!lumBuf || lumBuf.length !== n) lumBuf = new Float32Array(n);
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`image load failed: ${url}`));
    img.src = url;
  });
}

function stopVideo() {
  if (!videoEl) return;
  try { videoEl.pause(); } catch (_) {}
  videoEl.removeAttribute("src");
  try { videoEl.load(); } catch (_) {}
  videoEl = null;
  if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
}

async function loadImageSource(file) {
  let url = null, revoke = false;
  try {
    url = URL.createObjectURL(file);
    revoke = true;
    const img = await loadImage(url);
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    imgEl = img;
    setStatus(`${imgW}×${imgH}`);
  } catch (err) {
    console.warn("image load failed:", err);
    setStatus("load failed", true);
  } finally {
    if (revoke && url) URL.revokeObjectURL(url);
  }
}

function loadVideoSource(file) {
  return new Promise((resolve) => {
    videoUrl = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = videoUrl;
    v.loop = true;
    v.muted = true;
    v.playsInline = true;
    v.autoplay = true;
    v.addEventListener("loadedmetadata", () => {
      imgW = v.videoWidth;
      imgH = v.videoHeight;
      videoEl = v;
      v.play().catch((err) => {
        console.warn("video play blocked:", err);
        setStatus("video play blocked", true);
      });
      setStatus(`${imgW}×${imgH} · video`);
      resolve();
    }, { once: true });
    v.addEventListener("error", () => {
      console.warn("video load failed");
      setStatus("video load failed", true);
      if (videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
      resolve();
    }, { once: true });
  });
}

async function loadSource(file) {
  setStatus("loading…");
  stopVideo();
  imgEl = null;
  if (file && file.type && file.type.startsWith("video/")) return loadVideoSource(file);
  return loadImageSource(file);
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  cw = Math.floor(viewW * dpr);
  ch = Math.floor(viewH * dpr);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.clearRect(0, 0, cw, ch);
}
window.addEventListener("resize", resize);

// cover-fit downsample of source onto the character-grid resolution. Same
// fit convention as 10-edges / 12-edgemask so behavior is consistent.
function sampleSourceLuminance(src) {
  ensureGridBuffers();
  const scale = Math.max(dsW / imgW, dsH / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  const offX = (dsW - drawW) * 0.5;
  const offY = (dsH - drawH) * 0.5;
  dsCtx.fillStyle = "#000";
  dsCtx.fillRect(0, 0, dsW, dsH);
  dsCtx.imageSmoothingEnabled = true;
  dsCtx.drawImage(src, offX, offY, drawW, drawH);
  const { data } = dsCtx.getImageData(0, 0, dsW, dsH);
  const out = lumBuf;
  for (let i = 0, j = 0; i < out.length; i++, j += 4) {
    out[i] = (data[j] * 0.299 + data[j+1] * 0.587 + data[j+2] * 0.114) / 255;
  }
}

// fallback "source" when nothing is loaded — animated wavefield so the page
// shows an obvious effect on first visit.
function fallbackLuminance(t) {
  ensureGridBuffers();
  const out = lumBuf;
  const ts = t * 0.0008;
  const env = intensity();
  for (let y = 0; y < dsH; y++) {
    for (let x = 0; x < dsW; x++) {
      const u = x / dsW;
      const v = y / dsH;
      const a = Math.sin(u * 8 + ts);
      const b = Math.sin(v * 6 - ts * 1.3);
      const c = Math.sin((u + v) * 5 + ts * 0.7);
      const lum = 0.5 + 0.18 * (a + b * 0.8 + c * 0.6) + 0.15 * env;
      out[y * dsW + x] = lum < 0 ? 0 : lum > 1 ? 1 : lum;
    }
  }
}

function cellHash(x, y, salt) {
  let h = (x * 374761393 + y * 668265263 + salt * 2654435761) | 0;
  h = (h ^ (h >>> 13)) * 1274126177;
  return (h ^ (h >>> 16)) >>> 0;
}

function step(dt) {
  const t = performance.now();
  const env = intensity();

  const cs = Math.max(4, params.cellSize | 0) * dpr;
  const newDsW = Math.max(2, Math.ceil(cw / cs));
  const newDsH = Math.max(2, Math.ceil(ch / cs));
  if (newDsW !== dsW || newDsH !== dsH) {
    dsW = newDsW; dsH = newDsH;
    ensureGridBuffers();
  }

  const src = videoEl && videoEl.readyState >= 2 ? videoEl : imgEl;
  if (src && imgW > 0) {
    sampleSourceLuminance(src);
  } else {
    fallbackLuminance(t);
  }

  const charsetIdx = Math.max(0, Math.min(RAMPS.length - 1, params.charset | 0));
  const ramp = RAMPS[charsetIdx];
  const isScramble = charsetIdx === 1;
  const gamma = 1 / Math.max(0.05, params.contrast);

  // scramble mode advances its hash salt with audio — silent → frozen,
  // loud → fast cycle. audioJitter scales the audio contribution.
  const scrambleSalt = isScramble
    ? Math.floor(t * 0.001 * (1 + 60 * params.audioJitter * env))
    : 0;

  ctx.clearRect(0, 0, cw, ch);

  const fontPx = cs * Math.max(0.4, params.charScale);
  ctx.font = `${fontPx}px ui-monospace, SFMono-Regular, Menlo, monospace`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#fff";

  if (!isScramble) {
    // ramp paths render at full opacity — luminance is already encoded
    // through which character is picked.
    ctx.globalAlpha = 1;
    const last = ramp.length - 1;
    for (let y = 0; y < dsH; y++) {
      const cy = y * cs + cs * 0.5;
      for (let x = 0; x < dsW; x++) {
        let lum = lumBuf[y * dsW + x];
        if (gamma !== 1) lum = Math.pow(lum, gamma);
        if (lum < 0) lum = 0; else if (lum > 1) lum = 1;
        const idx = (lum * last + 0.5) | 0;
        const ch = ramp[idx];
        if (ch === " ") continue;
        ctx.fillText(ch, x * cs + cs * 0.5, cy);
      }
    }
  } else {
    // scramble: hash picks the glyph; alpha tracks luminance for the
    // heat-map / encoded look.
    const N = ramp.length;
    for (let y = 0; y < dsH; y++) {
      const cy = y * cs + cs * 0.5;
      for (let x = 0; x < dsW; x++) {
        let lum = lumBuf[y * dsW + x];
        if (gamma !== 1) lum = Math.pow(lum, gamma);
        if (lum < 0.04) continue;
        if (lum > 1) lum = 1;
        const h = cellHash(x, y, scrambleSalt);
        const ch = ramp[h % N];
        ctx.globalAlpha = lum;
        ctx.fillText(ch, x * cs + cs * 0.5, cy);
      }
    }
    ctx.globalAlpha = 1;
  }

  tickMarkers(dt);
  tickTelemetry(dt);
}

let lastT = performance.now();
function frame(t) {
  const dtRaw = (t - lastT) / 1000;
  lastT = t;
  const dt = Math.min(0.05, dtRaw);
  tickInputs(dt);
  step(dt);
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);

installMarkers({
  params,
  getSource: () => (videoEl && videoEl.readyState >= 2) ? videoEl : imgEl,
  getSourceDims: () => ({ w: imgW, h: imgH }),
});

installTelemetry({ params });
installPanel(params);

// reel-render hook: load a source by URL (reuses the existing file loader via
// fetch→File) and seek it per frame for the offline renderer / studio preview.
window.__loadSourceUrl = async (url, opts) => {
  const blob = await fetch(url).then((r) => r.blob());
  const file = new File([blob], blob.type.startsWith("video") ? "src.mp4" : "src.png", { type: blob.type });
  await loadSource(file);
  if (opts && opts.paused && videoEl) { try { videoEl.pause(); } catch (e) {} videoEl.autoplay = false; }
};
window.__seekSource = (t) => new Promise((res) => {
  if (!videoEl) return res();
  const d = videoEl.duration || 0;
  const tt = d > 0 ? (t % d) : t;
  if (Math.abs((videoEl.currentTime || 0) - tt) < 0.001) return res();
  const onS = () => res();
  videoEl.addEventListener("seeked", onS, { once: true });
  try { videoEl.currentTime = tt; } catch (e) { videoEl.removeEventListener("seeked", onS); res(); }
});

document.getElementById("src-file").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) loadSource(f);
});
</script>
</body>
</html>
