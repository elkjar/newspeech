<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="newspeech — audio experimentation.">
<meta property="og:title" content="NEWSPEECH // streaks">
<meta property="og:description" content="newspeech — audio experimentation.">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; cursor: none; }
  body { width: 100vw; height: 100vh; }
  #bg { position: fixed; inset: 0; display: block; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="panel" hidden>
  <div class="panel-title">streaks · params · [0] toggle</div>
  <label>
    <span class="name">scroll speed</span><span class="val"></span>
    <input type="range" min="0" max="3" step="0.01" data-k="scrollSpeed">
  </label>
  <label>
    <span class="name">streak density</span><span class="val"></span>
    <input type="range" min="0.1" max="3" step="0.01" data-k="streakDensity">
  </label>
  <label>
    <span class="name">chevron bands</span><span class="val"></span>
    <input type="range" min="0" max="20" step="1" data-k="chevronBands">
  </label>
  <label>
    <span class="name">texture rebuild rate</span><span class="val"></span>
    <input type="range" min="0" max="2" step="0.01" data-k="textureRate">
  </label>
  <label>
    <span class="name">tear rate</span><span class="val"></span>
    <input type="range" min="0" max="2" step="0.01" data-k="tearRate">
  </label>
  <label>
    <span class="name">thrash rate</span><span class="val"></span>
    <input type="range" min="0" max="1.5" step="0.01" data-k="thrashRate">
  </label>
</div>

<script src="core.js"></script>
<script>
const { intensity, poisson, installInputs, tickInputs, bumpActivity, installPanel } = Newspeech;
installInputs();

const params = {
  scrollSpeed: 0.5,
  streakDensity: 1,
  chevronBands: 7,
  textureRate: 0.18,
  tearRate: 0.05,
  thrashRate: 0.2,
};

// ---- canvas ----
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
const tex = document.createElement("canvas");
const tctx = tex.getContext("2d");

let viewW, viewH, dpr;
let scrollY = 0;

function buildTexture() {
  const w = viewW;
  const h = viewH * 2;
  tex.width = w;
  tex.height = h;

  tctx.fillStyle = "#050505";
  tctx.fillRect(0, 0, w, h);

  const numStreaks = Math.floor(h * 2.5 * params.streakDensity);
  for (let i = 0; i < numStreaks; i++) {
    const y = (Math.random() * h) | 0;
    const xStart = Math.random() * w;
    const xLen = 30 + Math.random() * (w * 0.7);
    const a = Math.pow(Math.random(), 4) * 0.5 + 0.006;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(xStart, y, xLen, 1);
  }

  const numBright = 5;
  for (let i = 0; i < numBright; i++) {
    const y = (Math.random() * h) | 0;
    const a = 0.25 + Math.random() * 0.45;
    tctx.fillStyle = `rgba(255, 255, 255, ${a})`;
    tctx.fillRect(0, y, w, 1 + ((Math.random() * 2) | 0));
  }
}

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  canvas.width = Math.floor(viewW * dpr);
  canvas.height = Math.floor(viewH * dpr);
  canvas.style.width = viewW + "px";
  canvas.style.height = viewH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildTexture();
}
window.addEventListener("resize", resize);
resize();

// ---- chevron bands ----
const chevronBands = [];

function makeChevronTile(period, h) {
  const tw = Math.ceil(period * 2);
  const tile = document.createElement("canvas");
  tile.width = tw;
  tile.height = h;
  const tx = tile.getContext("2d");
  tx.fillStyle = "#ffffff";
  const amp = h * 0.45;
  for (let x = 0; x < tw; x++) {
    const tri = Math.abs(((x / period) % 2) - 1);
    const yy = (h / 2) + (tri - 0.5) * amp;
    tx.fillRect(x, yy, 1, 2);
  }
  return tile;
}

function spawnChevronBands() {
  chevronBands.length = 0;
  const num = Math.max(0, Math.round(params.chevronBands));
  for (let i = 0; i < num; i++) {
    const h = 12 + ((Math.random() * 50) | 0);
    const period = 6 + Math.random() * 10;
    chevronBands.push({
      y: Math.random() * (viewH - h),
      h,
      period,
      tile: makeChevronTile(period, h),
      x: Math.random() * 1000,
      vx: (Math.random() * 2 - 1) * (40 + Math.random() * 120),
      baseAlpha: 0.04 + Math.random() * 0.10,
      breathPeriod: 3000 + Math.random() * 9000,
      breathPhase: Math.random() * Math.PI * 2,
    });
  }
}
spawnChevronBands();

poisson(() => 0.05 + 0.05 * intensity(), spawnChevronBands);
poisson(() => params.textureRate + 0.35 * intensity(), () => buildTexture());

// ---- tear bands ----
const tears = [];
poisson(
  () => params.tearRate + 0.5 * intensity(),
  () => {
    const h = 4 + Math.random() * 18;
    const y = Math.random() * (viewH - h);
    tears.push({ y, h, until: performance.now() + 60 + Math.random() * 60 });
  }
);

// ---- thrash burst ----
let thrashing = false;
function triggerThrash() {
  if (thrashing) return;
  thrashing = true;
  const dur = 500 + Math.random() * 700;
  const startedAt = performance.now();
  function step() {
    const elapsed = performance.now() - startedAt;
    if (elapsed > dur) { thrashing = false; return; }
    buildTexture();
    if (Math.random() < 0.35) spawnChevronBands();
    bumpActivity(0.7);
    setTimeout(step, 9 + Math.random() * 10);
  }
  step();
}
poisson(() => params.thrashRate + 0.44 * intensity(), triggerThrash);

// ---- draw ----
function drawStreaks(t, dt) {
  const scroll = params.scrollSpeed * (0.5 + 0.8 * intensity());
  scrollY = (scrollY + scroll * dt) % viewH;

  ctx.clearRect(0, 0, viewW, viewH);
  ctx.drawImage(tex, 0, scrollY, viewW, viewH, 0, 0, viewW, viewH);

  const env = intensity();

  for (const b of chevronBands) {
    b.x += b.vx * dt;
    const breath = 0.5 + 0.5 * Math.sin((t + b.breathPhase * 1000) / b.breathPeriod * 2 * Math.PI);
    const a = b.baseAlpha * breath * (0.3 + 0.9 * env);
    if (a < 0.005) continue;
    ctx.globalAlpha = Math.min(1, a);
    const tw = b.tile.width;
    const startX = -(((b.x % tw) + tw) % tw);
    for (let dx = startX; dx < viewW; dx += tw) {
      ctx.drawImage(b.tile, dx, b.y);
    }
  }
  ctx.globalAlpha = 1;

  for (let i = tears.length - 1; i >= 0; i--) {
    const tr = tears[i];
    if (t > tr.until) { tears.splice(i, 1); continue; }
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
    ctx.fillRect(0, tr.y, viewW, tr.h);
  }
}

// ---- RAF loop ----
let lastT = performance.now();
function frame(t) {
  const dt = (t - lastT) / 1000;
  lastT = t;
  tickInputs(dt);
  drawStreaks(t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener("click", (e) => {
  if (e.target.closest("#panel")) return;
  const th = 6 + Math.random() * 18;
  tears.push({
    y: Math.max(0, Math.min(viewH - th, e.clientY - th / 2)),
    h: th,
    until: performance.now() + 90 + Math.random() * 80,
  });
  buildTexture();
  spawnChevronBands();
  bumpActivity();
});

installPanel(params);
</script>
</body>
</html>
